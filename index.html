<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
    <title>Samsa Studio | Suitcase Configurator</title>
    <meta name="description" content="Customize your premium suitcase in 3D.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://distcdn.unlimited3d.com">
    <link rel="preconnect" href="https://dist.unlimited3d.com">
    <link rel="dns-prefetch" href="https://distcdn.unlimited3d.com">
    <link rel="dns-prefetch" href="https://dist.unlimited3d.com">
    <link rel="preload" href="https://distcdn.unlimited3d.com/pres/v/2.10.0/unlimited3d.min.js" as="script" fetchpriority="high">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
    <style>
    :root{
        --bg:#f5f5f3;
        --panel:#fff;
        --b1:rgba(0,0,0,.07);
        --b2:rgba(0,0,0,.13);
        --b3:rgba(0,0,0,.22);
        --s1:rgba(0,0,0,.025);
        --s2:rgba(0,0,0,.05);
        --s3:rgba(0,0,0,.08);
        --t1:rgba(0,0,0,.88);
        --t2:rgba(0,0,0,.44);
        --t3:rgba(0,0,0,.26);
        --e:cubic-bezier(0.22,1,0.36,1);
        --es:cubic-bezier(0.34,1.56,0.64,1);
        --ep:cubic-bezier(0.4,0,0.2,1);
        --d:0.24s;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:var(--bg);color:var(--t1);
        font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
        font-size:13px;line-height:1.5;overflow:hidden;
        -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    button{font-family:inherit;cursor:pointer;outline:none;-webkit-tap-highlight-color:transparent;border:none;background:none}
    button:focus-visible{box-shadow:0 0 0 2px rgba(0,0,0,.22)}

    /* ─── Loader ─── */
    .loader{
        position:fixed;inset:0;z-index:9999;background:var(--bg);
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
        transition:opacity .5s var(--e),visibility .5s;
    }
    .loader.hide{opacity:0;visibility:hidden;pointer-events:none}
    .ld-logo{font-size:9px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--t1)}
    .ld-sub{font-size:7px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-top:-10px}
    .ld-bw{width:80px;height:1px;background:rgba(0,0,0,.07);border-radius:1px;overflow:hidden;margin-top:4px}
    .ld-b{height:100%;width:0%;background:var(--t1);border-radius:1px;animation:lp 2.2s var(--e) forwards}
    @keyframes lp{0%{width:0}25%{width:55%}60%{width:76%}85%{width:90%}100%{width:96%}}
    .loader.hide .ld-b{width:100%!important;transition:width .1s}

    /* ─── 3D Canvas ─── */
    #container3d_replace{position:fixed;inset:0;width:100%;height:100%}

    /* ─── UI shell ─── */
    .ui{position:fixed;inset:0;z-index:10;pointer-events:none}

    /* ─── Toast ─── */
    .toast{
        position:fixed;bottom:28px;left:50%;
        transform:translateX(-50%) translateY(16px);
        background:rgba(16,16,16,.93);color:#fff;
        padding:9px 18px 9px 14px;
        border-radius:100px;
        font-size:11.5px;font-weight:500;letter-spacing:.1px;
        display:flex;align-items:center;gap:8px;
        box-shadow:0 4px 20px rgba(0,0,0,.18);
        z-index:9998;pointer-events:none;
        transition:transform .38s var(--e),opacity .28s;
        opacity:0;white-space:nowrap;
    }
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .toast-dot{width:6px;height:6px;border-radius:50%;background:#fff;flex-shrink:0;opacity:.5}

    /* ─── Panel open btn (reopen) ─── */
    .panel-open-btn{
        pointer-events:auto;
        position:absolute;top:16px;right:16px;
        width:38px;height:38px;border-radius:12px;
        background:var(--panel);border:1px solid var(--b1);
        box-shadow:0 2px 12px rgba(0,0,0,.08);
        display:none;place-items:center;
        color:var(--t2);
        transition:background var(--d) var(--e),color var(--d) var(--e),transform .2s var(--es);
        cursor:pointer;
    }
    .panel-open-btn.show{display:grid}
    .panel-open-btn:hover{background:var(--s2);color:var(--t1);transform:scale(1.06)}
    .panel-open-btn:active{transform:scale(.94)}
    .panel-open-btn svg{width:14px;height:14px}

    /* ─── Panel ─── */
    .panel{
        pointer-events:auto;
        position:absolute;top:16px;right:16px;bottom:16px;width:300px;
        background:var(--panel);
        border:1px solid var(--b1);
        border-radius:18px;
        display:flex;flex-direction:column;
        overflow:hidden;
        box-shadow:0 2px 24px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.04);
        animation:panelIn .55s var(--e) .2s both;
        transition:transform .42s var(--e),opacity .3s var(--e),box-shadow .3s;
        will-change:transform;
    }
    .panel.off{
        transform:translateX(calc(100% + 20px));
        opacity:0;pointer-events:none;
    }
    @keyframes panelIn{
        from{transform:translateX(24px);opacity:0}
        to{transform:translateX(0);opacity:1}
    }

    /* ─── Mobile drag handle ─── */
    .handle{
        display:none;
        flex-direction:column;align-items:center;
        width:100%;padding:10px 0 6px;
        background:none;flex-shrink:0;cursor:grab;
    }
    .handle:active{cursor:grabbing}
    .handle-pill{
        width:32px;height:3px;border-radius:3px;
        background:rgba(0,0,0,.12);
        transition:background .2s,width .2s var(--es);
    }
    .handle:hover .handle-pill{background:rgba(0,0,0,.22);width:38px}
    .handle:active .handle-pill{background:rgba(0,0,0,.35)}

    /* ─── Panel header ─── */
    .panel-header{padding:14px 14px 0;flex-shrink:0}
    .ph-row{
        display:flex;align-items:center;justify-content:space-between;
        margin-bottom:12px;
    }
    .panel-label{
        font-size:7px;font-weight:700;letter-spacing:3.5px;
        text-transform:uppercase;color:var(--t3);
    }
    .btn-collapse{
        width:24px;height:24px;border-radius:7px;
        background:var(--s1);
        color:var(--t3);
        display:grid;place-items:center;
        transition:background var(--d) var(--e),color var(--d) var(--e),transform .18s var(--es);
    }
    .btn-collapse svg{width:12px;height:12px}
    .btn-collapse:hover{background:var(--s3);color:var(--t1);transform:scale(1.1)}
    .btn-collapse:active{transform:scale(.9)}

    /* ─── Category tabs ─── */
    .cats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:0}
    .cat{
        padding:7px 4px 8px;
        border:1px solid transparent;border-radius:9px;
        display:flex;flex-direction:column;align-items:center;gap:5px;
        font-size:8px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
        color:var(--t3);text-align:center;
        transition:all var(--d) var(--e);position:relative;
    }
    .cat:hover{background:var(--s1);color:var(--t2)}
    .cat.on{background:var(--s2);color:var(--t1);border-color:var(--b1)}
    .cat-dot{
        width:7px;height:7px;border-radius:50%;flex-shrink:0;
        border:1.5px solid rgba(255,255,255,.3);
        box-shadow:0 1px 3px rgba(0,0,0,.25);
        transition:transform .3s var(--es),box-shadow .3s;
    }
    .cat:hover .cat-dot{transform:scale(1.2)}
    .cat.on .cat-dot{transform:scale(1.25);box-shadow:0 2px 6px rgba(0,0,0,.3)}

    /* ─── Divider ─── */
    .divider{height:1px;background:var(--b1);margin:0 14px;flex-shrink:0}

    /* ─── Scroll area ─── */
    .scroll{flex:1;overflow-y:auto;padding:14px 14px 16px;scrollbar-width:none}
    .scroll::-webkit-scrollbar{display:none}

    /* ─── Section header ─── */
    .hd{
        display:flex;align-items:center;justify-content:space-between;
        margin-bottom:12px;
    }
    .hd-left{}
    .hd-title{font-size:14px;font-weight:600;color:var(--t1);letter-spacing:-.1px;display:block}
    .hd-sub{font-size:8.5px;font-weight:400;color:var(--t3);letter-spacing:.2px;display:block;margin-top:1px}
    .btn-cam{
        width:28px;height:28px;border-radius:50%;
        background:var(--s1);
        color:var(--t3);
        display:grid;place-items:center;
        transition:background var(--d) var(--e),color var(--d) var(--e),transform .2s var(--es);
    }
    .btn-cam svg{width:13px;height:13px}
    .btn-cam:hover{background:var(--s3);color:var(--t1);transform:scale(1.1) rotate(-20deg)}
    .btn-cam:active{transform:scale(.9)}

    /* ─── Color grid ─── */
    .grid{
        display:grid;grid-template-columns:repeat(3,1fr);
        gap:6px;margin-bottom:14px;
    }
    .sw{
        display:flex;flex-direction:column;align-items:center;gap:7px;
        padding:12px 6px 10px;border-radius:12px;
        border:1px solid transparent;
        transition:background var(--d) var(--e),border-color var(--d) var(--e),transform .18s var(--es);
        position:relative;overflow:hidden;
    }
    .sw::after{
        content:'';position:absolute;inset:0;border-radius:12px;
        background:radial-gradient(circle at center,rgba(0,0,0,.06),transparent 70%);
        opacity:0;transition:opacity .15s;
    }
    .sw:active::after{opacity:1}
    .sw:hover{background:var(--s1);transform:translateY(-1px)}
    .sw:active{transform:translateY(0) scale(.97)}
    .sw.on{background:var(--s2);border-color:var(--b2)}

    /* orb */
    .orb{
        width:46px;height:46px;border-radius:50%;position:relative;
        transition:transform .3s var(--es),box-shadow .3s var(--e);flex-shrink:0;
        border:1px solid rgba(255,255,255,.12);
        box-shadow:
            0 6px 16px rgba(0,0,0,.3),
            0 2px 4px rgba(0,0,0,.2),
            inset 0 -4px 8px rgba(0,0,0,.15);
    }
    /* specular highlight */
    .orb::before{
        content:'';position:absolute;top:5px;left:8px;width:48%;height:30%;
        border-radius:50%;
        background:radial-gradient(ellipse at 45% 35%,rgba(255,255,255,.6),rgba(255,255,255,0) 70%);
        opacity:.75;pointer-events:none;
    }
    /* selection ring */
    .orb::after{
        content:'';position:absolute;inset:-6px;border-radius:50%;
        border:2px solid transparent;
        transition:border-color .25s var(--e),box-shadow .25s var(--e),transform .3s var(--es);
    }
    .sw:hover .orb{
        transform:scale(1.1);
        box-shadow:0 10px 24px rgba(0,0,0,.28),0 3px 6px rgba(0,0,0,.18),inset 0 -4px 8px rgba(0,0,0,.12);
    }
    .sw.on .orb{
        transform:scale(1.06);
        box-shadow:0 8px 20px rgba(0,0,0,.32),0 2px 4px rgba(0,0,0,.2),inset 0 -4px 8px rgba(0,0,0,.15);
    }
    .sw.on .orb::after{
        border-color:rgba(0,0,0,.28);
        box-shadow:0 0 0 2px rgba(0,0,0,.05);
        transform:scale(1);
    }

    /* check */
    .chk{
        position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
        opacity:0;transform:scale(.3) rotate(-20deg);
        transition:opacity .25s var(--e),transform .35s var(--es);
    }
    .chk svg{width:16px;height:16px;filter:drop-shadow(0 1px 3px rgba(0,0,0,.7))}
    .sw.on .chk{opacity:1;transform:scale(1) rotate(0)}

    /* label */
    .sw-lbl{
        font-size:9px;font-weight:500;color:var(--t3);
        text-align:center;letter-spacing:.1px;line-height:1.25;
        transition:color var(--d) var(--e),font-weight 0s;
    }
    .sw.on .sw-lbl{color:var(--t1);font-weight:600}

    /* ─── CTA button ─── */
    .btn-go{
        width:100%;padding:12px 16px;
        background:var(--t1);color:#fff;
        border-radius:11px;
        font-size:9.5px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
        display:flex;align-items:center;justify-content:center;gap:8px;
        transition:opacity .2s,transform .18s var(--es),box-shadow .2s;
        box-shadow:0 2px 8px rgba(0,0,0,.15);
    }
    .btn-go:hover{opacity:.88;transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.18)}
    .btn-go:active{transform:translateY(0) scale(.98);opacity:1;box-shadow:0 1px 4px rgba(0,0,0,.12)}
    .btn-go-arrow{transition:transform .2s var(--es)}
    .btn-go:hover .btn-go-arrow{transform:translateX(3px)}

    /* ─── Global keyframes ─── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes orbIn{
        0%{opacity:0;transform:translateY(6px) scale(.85)}
        60%{transform:translateY(-2px) scale(1.04)}
        100%{opacity:1;transform:translateY(0) scale(1)}
    }
    .sw{animation:orbIn .35s var(--es) both}

    /* ─── Breakpoints ─── */
    @media(min-width:1200px){.panel{width:310px}}

    @media(max-width:1100px){.panel{width:284px;right:14px;top:14px;bottom:14px}}

    @media(max-width:768px){
        .handle{display:flex}
        .btn-collapse,.panel-open-btn{display:none!important}

        .panel{
            position:fixed!important;
            top:auto!important;right:0!important;left:0!important;bottom:0!important;
            width:100%!important;height:auto;
            max-height:52vh;
            border-radius:16px 16px 0 0;border-bottom:none;
            padding-bottom:env(safe-area-inset-bottom,0);
            transition:max-height .42s var(--e);
            box-shadow:0 -2px 20px rgba(0,0,0,.09);
            animation:sheetIn .4s var(--e) .15s both;
        }
        @keyframes sheetIn{
            from{transform:translateY(100%)}
            to{transform:translateY(0)}
        }
        .panel.min{max-height:44px;overflow:hidden}
        .panel.min .panel-header,
        .panel.min .divider,
        .panel.min .scroll{opacity:0;visibility:hidden;pointer-events:none;position:absolute}

        .panel-header{padding:8px 12px 0}
        .ph-row{margin-bottom:8px}
        .scroll{padding:10px 12px 14px}

        /* 4 columns on mobile for compactness */
        .cats{grid-template-columns:repeat(4,1fr);gap:4px}
        .cat{padding:5px 2px 7px;gap:4px;border-radius:7px;font-size:7.5px}
        .cat-dot{width:6px;height:6px}

        .divider{margin:0 12px}

        .hd{margin-bottom:8px}
        .hd-title{font-size:13px}
        .hd-sub{font-size:8px}
        .btn-cam{width:26px;height:26px}
        .btn-cam svg{width:12px;height:12px}

        /* 4 cols on mobile — more compact */
        .grid{grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px}
        .sw{padding:8px 4px 7px;gap:5px;border-radius:9px}
        .orb{width:32px;height:32px}
        .orb::before{top:3px;left:5px}
        .orb::after{inset:-5px}
        .chk svg{width:12px;height:12px}
        .sw-lbl{font-size:7.5px}
        @keyframes orbIn{
            0%{opacity:0;transform:scale(.85)}
            100%{opacity:1;transform:scale(1)}
        }

        .btn-go{padding:11px;font-size:9px;letter-spacing:1.5px;border-radius:9px}

        .toast{bottom:18px;font-size:11px;padding:8px 16px 8px 12px}
    }

    @media(max-width:768px) and (orientation:landscape){
        .panel{
            left:auto!important;right:0!important;
            top:0!important;width:46%!important;
            max-height:100vh;
            border-radius:16px 0 0 16px;
        }
        .handle{display:none}
        .panel.min{max-height:100vh;overflow:visible}
        .panel.min .panel-header,
        .panel.min .divider,
        .panel.min .scroll{opacity:1;visibility:visible;pointer-events:auto;position:static}
        .grid{grid-template-columns:repeat(3,1fr)}
    }

    @media(max-width:390px){
        .panel{max-height:54vh}
        .orb{width:28px;height:28px}
        .sw-lbl{font-size:7px}
    }
    </style>
</head>

<div class="loader" id="ld">
    <span class="ld-logo">Samsa Studio</span>

</div>

<div id="container3d_replace"></div>
<div class="toast" id="toast"><span class="toast-dot"></span><span id="toast-msg"></span></div>

<div class="ui">

        <div class="scroll">

                <div class="hd-left">
                    <span class="hd-title" id="htl">Body</span>

                    </svg>

                </span>
            </button>
        </div>
    </div>
</div>

    {k:'red',n:'Chrome CHERRY RED',l:'Red',g:'radial-gradient(circle at 32% 28%,#e85060,#a82030 50%,#580a12 100%)'},
    {k:'blue',n:'Chrome ROYAL BLUE',l:'Blue',g:'radial-gradient(circle at 32% 28%,#7aa0f0,#3868c8 50%,#142e6e 100%)'},
    {k:'orange',n:'Chrome SATIN BURNT ORANGE',l:'Orange',g:'radial-gradient(circle at 32% 28%,#f09848,#c06018 50%,#6e3008 100%)'},
    {k:'green',n:'Chrome SATIN OLIVE GREEN',l:'Green',g:'radial-gradient(circle at 32% 28%,#8cb85c,#4e7230 50%,#2a3e18 100%)'}
]);

var CM=Object.freeze({
    body:{d:'camera_body',m:'camera_body_mobile'},
    handles:{d:'camera_handle',m:'camera_handle_mobile'},
    corners:{d:'camera_corners',m:'Camera_corners_mobile'},
    wheels:{d:'camera_wheels',m:'camera_wheels_mobile'}
});
var DP=Object.freeze({
    blue:['blue','black','aluminium'],green:['green','black','aluminium'],
    orange:['orange','black','aluminium'],red:['red','black','aluminium'],
    black:['black','aluminium'],aluminium:['black','aluminium']
});

var CS=['body','handles','corners','wheels'];
var ci=0,mob=innerWidth<=768,rdy=false;
var sel={body:'aluminium',handles:'aluminium',corners:'aluminium',wheels:'aluminium'};

// Gradients map for category dots
var allMats={};
MB.forEach(function(m){allMats[m.k]=m.g});
MO.forEach(function(m){allMats[m.k]=m.g});

bCats();render();

Unlimited3D.init(SDK);
addEventListener('Unlimited3DReady',boot);
var _t=setTimeout(function(){if(!rdy)boot()},5000);

// ── Patch SDK: bloquea activateModifier durante rotaciones ──
var _origActivate=null,_blockModifierUntil=0;
function patchSDK(){
    if(!Unlimited3D||!Unlimited3D.activateModifier)return;
    _origActivate=Unlimited3D.activateModifier.bind(Unlimited3D);
    Unlimited3D.activateModifier=function(opts){
        if(Date.now()<_blockModifierUntil)return;
        return _origActivate(opts);
    };
}

function boot(){
    if(rdy)return;rdy=true;clearTimeout(_t);
    try{
        patchSDK();
        if(Unlimited3D.setCameraControlsSettings){
            Unlimited3D.setCameraControlsSettings({
                enableZoom:true,enablePan:false,enableRotate:true,
                minDistance:4,maxDistance:7,dampingFactor:0.15
            });
        }
        toggleAnnotations(true);
        setupAnnotationClickHandler();
    }catch(e){console.warn('[Samsa] Init warning:',e)}
    dcam();
    document.getElementById('ld').classList.add('hide');
    sendConfig();
}

// ── Annotation handling ──
// Cámara que se activa DESPUÉS del modifier para sobreescribir la cámara interna del SDK
var ACAM=Object.freeze({
    'open':              {d:'default_camera_desktop', m:'default_camera_mobile'},
    'close':             {d:'default_camera_desktop', m:'default_camera_mobile'},
    'extend_handle':     {d:'camera_handle',          m:'camera_handle_mobile'},
    'retract_handle':    {d:'camera_handle',          m:'camera_handle_mobile'},
    'wheel_spinner_on':  {d:'camera_wheels',          m:'camera_wheels_mobile'},
    'wheel_spinner_off': {d:'camera_wheels',          m:'camera_wheels_mobile'}
});
var _blockUntil=0;
function handleAnnotationResult(err,selected){
    if(!selected||!selected.length)return;
    var display=selected[0].name;
    var name=display.toLowerCase();
    var modifier=null;
    if(name.includes('open')&&!name.includes('locker')) modifier='open';
    else if(name.includes('close')&&!name.includes('locker')) modifier='close';
    else if(name.includes('extend')) modifier='extend_handle';
    else if(name.includes('retract')) modifier='retract_handle';
    else if(name.includes('spinner')&&name.includes('on')) modifier='wheel_spinner_on';
    else if(name.includes('spinner')&&name.includes('off')) modifier='wheel_spinner_off';
    if(!modifier)return;
    _blockUntil=Date.now()+4000;
    var cam=ACAM[modifier];
    if(cam)md(mob?cam.m:cam.d); // cámara antes del modifier — un solo movimiento
    md(modifier);
    showToast(display);
}

function setupAnnotationClickHandler(){
    setTimeout(function(){
        var canvas=document.querySelector('canvas[data-engine*="three"]')
                 ||document.querySelector('#container3d_replace canvas')
                 ||document.querySelector('canvas');
        if(!canvas){setTimeout(setupAnnotationClickHandler,500);return;}
        var pending=false;
        function query(){
            if(Date.now()<_blockUntil)return; // bloqueado post-activación
            if(pending)return;pending=true;
            setTimeout(function(){
                pending=false;
                Unlimited3D.getSelectedAnnotations(handleAnnotationResult);
            },mob?260:100);
        }
        if(mob){
            var _tx=0,_ty=0,_tstart=0,_wasMT=false;
            // capture:true → nuestro listener corre ANTES que los del SDK (bubble)
            canvas.addEventListener('touchstart',function(e){
                if(e.touches.length>1){_wasMT=true;return;}
                _tx=e.touches[0].clientX;_ty=e.touches[0].clientY;
                _tstart=Date.now();_wasMT=false;
            },{passive:true,capture:true});
            canvas.addEventListener('touchend',function(e){
                var drag=_wasMT;
                if(!drag){
                    var t=e.changedTouches[0];
                    var dx=t.clientX-_tx,dy=t.clientY-_ty;
                    drag=(dx*dx+dy*dy>225)||(Date.now()-_tstart>=350);
                }
                if(drag){
                    _blockModifierUntil=Date.now()+500;
                    return;
                }
                query();
            },{capture:true}); // capture → interceptamos antes del handler del SDK
        }else{
            // Desktop: detectar drag por mouse para no disparar query en rotaciones
            var _mx=0,_my=0,_mdrag=false;
            canvas.addEventListener('mousedown',function(e){
                _mx=e.clientX;_my=e.clientY;_mdrag=false;
            });
            canvas.addEventListener('mousemove',function(e){
                if(_mdrag)return;
                var dx=e.clientX-_mx,dy=e.clientY-_my;
                if(dx*dx+dy*dy>25)_mdrag=true; // >5px = drag
            });
            canvas.addEventListener('mouseup',function(){
                if(_mdrag){
                    toggleAnnotations(false);
                    setTimeout(function(){toggleAnnotations(true);},400);
                }
            });
            canvas.addEventListener('click',function(){
                if(_mdrag)return;
                query();
            });
        }
    },1000);
}

function toggleAnnotations(show){
    try{if(Unlimited3D.showAnnotations)Unlimited3D.showAnnotations(show);}
    catch(e){}
}

// ── Toast ──
var _toastT;
function showToast(msg){
    document.getElementById('toast-msg').textContent=msg;
    var t=document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(_toastT);
    _toastT=setTimeout(function(){t.classList.remove('show')},2200);
}

// ── Material application ──
function ap(cat,mat,cb){
    Unlimited3D.changeMaterial({parts:P[cat],material:mat},function(e){
        if(!e){if(cb)cb();return}
        Unlimited3D.changeMaterials({partObjects:[{parts:P[cat],material:mat}]},function(e2){
            if(!e2){if(cb)cb();return}
            var f=PF[cat];if(f)Unlimited3D.changeMaterial({parts:f,material:mat},function(){if(cb)cb()})
        })
    })
}

function md(n){
    var fn=_origActivate||Unlimited3D.activateModifier.bind(Unlimited3D);
    try{fn({modifier:n});}
    catch(e){console.warn('[Samsa] Modifier error:',n,e)}
}
function dcam(){md(mob?'default_camera_mobile':'default_camera_desktop')}

// ── UI builders ──
function bCats(){
    var el=document.getElementById('cats');el.innerHTML='';
    CS.forEach(function(c,i){
        var b=document.createElement('button');
        b.className='cat'+(i===ci?' on':'');
        var g=allMats[sel[c]]||'#ccc';
        b.innerHTML='<span class="cat-dot" style="background:'+g+'"></span>'
                   +'<span>'+c+'</span>';
        b.addEventListener('click',function(){go(c)});
        el.appendChild(b);
    });
}

function go(c){
    ci=CS.indexOf(c);bCats();
    document.getElementById('htl').textContent=c.charAt(0).toUpperCase()+c.slice(1);
    var cm=CM[c];if(cm)md(mob?cm.m:cm.d);
    render();
    if(mob)pnl.classList.remove('min');
    updateNextBtn();
}

function updateNextBtn(){
    var next=CS[(ci+1)%CS.length];
    var txt=next.charAt(0).toUpperCase()+next.slice(1);
    document.getElementById('bn-txt').textContent='Next: '+txt;
}

function render(){
    var g=document.getElementById('cg');
    // Crossfade out
    g.style.transition='opacity .15s,transform .15s';
    g.style.opacity='0';g.style.transform='translateY(4px)';

    setTimeout(function(){
        g.innerHTML='';
        var c=CS[ci],list;
        if(c==='body'){list=MB;}else{
            var ok=DP[sel.body]||DP.aluminium;
            list=MO.filter(function(m){return ok.indexOf(m.k)!==-1});
        }
        document.getElementById('hct').textContent=list.length+' color'+(list.length!==1?'s':'');
        list.forEach(function(it,i){
            var b=document.createElement('button');
            b.className='sw'+(sel[c]===it.k?' on':'');
            b.style.animationDelay=(i*.045)+'s';
            b.setAttribute('aria-label',it.l);
            b.innerHTML='<div class="orb" style="background:'+it.g+'"><div class="chk">'+ICO.check+'</div></div>'
                       +'<span class="sw-lbl">'+it.l+'</span>';
            b.addEventListener('click',function(){pick(c,it)});
            g.appendChild(b);
        });
        // Crossfade in
        requestAnimationFrame(function(){
            g.style.transition='opacity .2s var(--e),transform .22s var(--e)';
            g.style.opacity='1';g.style.transform='translateY(0)';
        });
    },120);
}

function pick(c,it){
    ap(c,it.n);sel[c]=it.k;
    if(c==='body'){
        var d=MO[0];
        ['handles','corners','wheels'].forEach(function(x){sel[x]='aluminium';ap(x,d.n)});
    }
    bCats();render();sendConfig();
}

function sendConfig(){
    if(window.parent&&window.parent!==window){
        var readable={
            body:MB.find(function(m){return m.k===sel.body}).l,
            handles:MO.find(function(m){return m.k===sel.handles}).l,
            corners:MO.find(function(m){return m.k===sel.corners}).l,
            wheels:MO.find(function(m){return m.k===sel.wheels}).l
        };
        window.parent.postMessage({type:'CONFIG_UPDATE',payload:sel,readable:readable,timestamp:Date.now()},'*');
    }
}

// ── DOM refs & events ──
var pnl=document.getElementById('pnl');
var pob=document.getElementById('pob');

updateNextBtn();

document.getElementById('bn').addEventListener('click',function(){ci=(ci+1)%CS.length;go(CS[ci])});
document.getElementById('bx').addEventListener('click',function(){
    // Ripple feedback on cam reset
    dcam();showToast('Camera reset');
});

// Collapse / expand (desktop)
document.getElementById('bcol').addEventListener('click',function(){
    // Limpia la animación de entrada para que la transition de salida funcione
    pnl.style.animation='none';
    pnl.offsetHeight; // force reflow
    pnl.classList.add('off');
    setTimeout(function(){pob.classList.add('show')},220);
});
pob.addEventListener('click',function(){
    pob.classList.remove('show');
    pnl.classList.remove('off');
});

// Mobile handle
document.getElementById('hnd').addEventListener('click',function(){
    if(mob)pnl.classList.toggle('min');
});
if(mob)pnl.classList.add('min');

addEventListener('resize',function(){
    var was=mob;mob=innerWidth<=768;
    if(was!==mob){dcam();pnl.classList.remove('min');}
});

setInterval(sendConfig,5000);

// Service Worker — cachea assets Threedium para carga instantánea en revisitas
if('serviceWorker' in navigator){
    window.addEventListener('load',function(){
        navigator.serviceWorker.register('./sw.js').catch(function(){});
    });
}

return Object.freeze({
    get state(){return Object.assign({},sel)},
    get readable(){
        return{
            body:MB.find(function(m){return m.k===sel.body}).l,
            handles:MO.find(function(m){return m.k===sel.handles}).l,
            corners:MO.find(function(m){return m.k===sel.corners}).l,
            wheels:MO.find(function(m){return m.k===sel.wheels}).l
        }
    }
});
})();
</script>
