<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
    <title>Suitcase Configurator</title>
    <meta name="description" content="Customize your premium suitcase in 3D.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://distcdn.unlimited3d.com">
    <link rel="preconnect" href="https://dist.unlimited3d.com">
    <link rel="dns-prefetch" href="https://distcdn.unlimited3d.com">
    <link rel="dns-prefetch" href="https://dist.unlimited3d.com">
    <link rel="preload" href="https://distcdn.unlimited3d.com/pres/v/2.10.0/unlimited3d.min.js" as="script" fetchpriority="high">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
    <style>
    :root{
        --bg:#f5f5f3;
        --panel:#fff;
        --b1:rgba(0,0,0,.07);
        --b2:rgba(0,0,0,.13);
        --b3:rgba(0,0,0,.22);
        --s1:rgba(0,0,0,.025);
        --s2:rgba(0,0,0,.05);
        --s3:rgba(0,0,0,.08);
        --t1:rgba(0,0,0,.88);
        --t2:rgba(0,0,0,.44);
        --t3:rgba(0,0,0,.26);
        --e:cubic-bezier(0.22,1,0.36,1);
        --es:cubic-bezier(0.34,1.56,0.64,1);
        --ep:cubic-bezier(0.4,0,0.2,1);
        --d:0.16s;
        --sab:env(safe-area-inset-bottom,0px);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    /* Excluir el contenedor 3D del reset global para no romper los elementos del SDK */
    #container3d_replace *,
    #container3d_replace *::before,
    #container3d_replace *::after{margin:revert;padding:revert;box-sizing:revert}
    html,body{width:100%;height:100%;background:var(--bg);color:var(--t1);
        font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
        font-size:13px;line-height:1.5;overflow:hidden;
        -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    button{font-family:inherit;cursor:pointer;outline:none;-webkit-tap-highlight-color:transparent;border:none;background:none}
    button:focus-visible{box-shadow:0 0 0 2px rgba(0,0,0,.22)}

    /* ─── Loader ─── */
    .loader{
        position:fixed;inset:0;z-index:9999;background:var(--bg);
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
        transition:opacity .5s var(--e),visibility .5s;
    }
    .loader.hide{opacity:0;visibility:hidden;pointer-events:none}
    .ld-bw{width:80px;height:1px;background:rgba(0,0,0,.07);border-radius:1px;overflow:hidden}
    .ld-b{height:100%;width:0%;background:var(--t1);border-radius:1px;animation:lp 2.2s var(--e) forwards}
    @keyframes lp{0%{width:0}25%{width:55%}60%{width:76%}85%{width:90%}100%{width:96%}}
    .loader.hide .ld-b{width:100%!important;transition:width .1s}

    /* ─── 3D Canvas ─── */
    #container3d_replace{position:fixed;inset:0;width:100%;height:100%}

    /* ─── UI shell ─── */
    /* z-index:2 para quedar por encima del canvas pero por debajo del overlay de anotaciones del SDK */
    .ui{position:fixed;inset:0;z-index:2;pointer-events:none}

    /* ─── Toast ─── */
    .toast{
        position:fixed;left:50%;
        transform:translateX(-50%) translateY(16px);
        background:rgba(16,16,16,.93);color:#fff;
        padding:9px 18px 9px 14px;
        border-radius:100px;
        font-size:11.5px;font-weight:500;letter-spacing:.1px;
        display:flex;align-items:center;gap:8px;
        box-shadow:0 4px 20px rgba(0,0,0,.18);
        z-index:9998;pointer-events:none;
        transition:transform .38s var(--e),opacity .28s,bottom .3s var(--e);
        opacity:0;white-space:nowrap;
        bottom:80px;
    }
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .toast-dot{width:6px;height:6px;border-radius:50%;background:#fff;flex-shrink:0;opacity:.5}

    /* ─── Top tabs (Configurator / Animations) ─── */
    .top-tabs{
        pointer-events:auto;
        position:absolute;top:18px;left:50%;transform:translateX(-50%);
        display:flex;
        border:1px solid var(--b2);border-radius:8px;
        overflow:hidden;background:var(--panel);
        box-shadow:0 2px 12px rgba(0,0,0,.06);
        z-index:20;
    }
    .top-tab{
        padding:9px 24px;
        font-size:8.5px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;
        color:var(--t2);
        transition:all var(--d) var(--e);
        position:relative;
    }
    .top-tab+.top-tab::before{
        content:'';position:absolute;top:20%;left:0;width:1px;height:60%;
        background:var(--b1);
    }
    .top-tab:hover{color:var(--t1);background:var(--s1)}
    .top-tab.on{color:var(--t1);background:var(--s2)}

    /* ─── Bottom category bar (desktop) ─── */
    .bottom-bar{
        pointer-events:auto;
        position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
        display:flex;gap:6px;
        z-index:20;
        transition:opacity .3s var(--e),transform .3s var(--e);
    }
    .bottom-bar.hide{opacity:0;transform:translateX(-50%) translateY(10px);pointer-events:none}

    /* ─── Animation action buttons ─── */
    .anim-bar{
        pointer-events:auto;
        position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
        display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
        z-index:20;
        transition:opacity .3s var(--e),transform .3s var(--e);
    }
    .anim-bar.hide{opacity:0;transform:translateX(-50%) translateY(10px);pointer-events:none}
    .anim-btn{
        padding:8px 18px;
        border:1px solid var(--b2);border-radius:100px;
        font-size:8px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;
        color:var(--t1);background:var(--panel);
        box-shadow:0 2px 8px rgba(0,0,0,.07);
        transition:all var(--d) var(--e);
        cursor:pointer;
    }
    .anim-btn:hover{background:var(--s2);transform:translateY(-1px)}
    .anim-btn:active{transform:translateY(0) scale(.97)}
    .anim-btn.active{background:var(--t1);color:#fff;border-color:var(--t1);box-shadow:0 3px 12px rgba(0,0,0,.18)}
    .cat-pill{
        padding:8px 18px;
        border:1px solid var(--b2);border-radius:100px;
        font-size:8px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;
        color:var(--t1);
        background:var(--panel);
        box-shadow:0 2px 8px rgba(0,0,0,.07);
        transition:all var(--d) var(--e);
    }
    .cat-pill:hover{background:var(--s2);color:var(--t1);transform:translateY(-1px)}
    .cat-pill:active{transform:translateY(0) scale(.97)}
    .cat-pill.on{background:var(--t1);color:#fff;border-color:var(--t1);box-shadow:0 3px 12px rgba(0,0,0,.18)}


    /* ─── Panel (desktop: right sidebar / mobile: bottom sheet) ─── */
    .panel{
        pointer-events:auto;
        position:absolute;top:14px;right:14px;width:256px;
        height:auto;max-height:calc(100vh - 28px);
        background:var(--panel);
        border:1px solid var(--b1);
        border-radius:16px;
        display:flex;flex-direction:column;
        overflow:hidden;
        box-shadow:0 2px 20px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.03);
        transition:transform .22s var(--e),opacity .18s var(--e);
    }
    .panel.show{animation:panelIn .4s var(--e) both}
    .panel.off{
        transform:translateX(calc(100% + 16px));
        opacity:0;pointer-events:none;
    }
    @keyframes panelIn{
        from{transform:translateX(20px);opacity:0}
        to{transform:translateX(0);opacity:1}
    }

    /* ─── Mobile drag handle ─── */
    .handle{
        display:none;
        flex-direction:column;align-items:center;
        width:100%;padding:10px 0 4px;
        background:none;flex-shrink:0;
        touch-action:none;
    }
    .handle-pill{
        width:28px;height:3px;border-radius:3px;
        background:rgba(0,0,0,.1);
        transition:background .2s,width .2s var(--es);
    }
    .handle.dragging .handle-pill{background:rgba(0,0,0,.3);width:40px}

    /* ─── Panel header ─── */
    .panel-header{padding:14px 14px 0;flex-shrink:0}
    .ph-row{
        display:flex;align-items:center;justify-content:space-between;
        margin-bottom:2px;
    }
    .ph-title{
        font-size:11px;font-weight:700;letter-spacing:1.5px;
        text-transform:uppercase;color:var(--t1);
    }
    .btn-close{
        width:28px;height:28px;border-radius:6px;
        background:transparent;
        color:var(--t3);
        display:grid;place-items:center;
        transition:background var(--d) var(--e),color var(--d) var(--e),transform .18s var(--es);
    }
    .btn-close svg{width:14px;height:14px}
    .btn-close:hover{background:var(--s3);color:var(--t1);transform:scale(1.1)}
    .btn-close:active{transform:scale(.9)}

    /* ─── Panel subtitle ─── */
    .panel-sub{
        display:flex;align-items:center;justify-content:space-between;
        padding:0 14px 10px;flex-shrink:0;
    }
    .ps-label{font-size:10px;color:var(--t3);font-weight:400}
    .ps-value{font-size:10px;color:var(--t1);font-weight:600;text-transform:uppercase;letter-spacing:.5px}

    /* ─── Divider ─── */
    .divider{height:1px;background:var(--b1);margin:0 14px;flex-shrink:0}

    /* ─── Scroll area ─── */
    .scroll{flex:1;overflow-y:auto;padding:12px 14px 14px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
    .scroll::-webkit-scrollbar{display:none}

    /* ─── Color grid ─── */
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px}
    .sw{
        display:flex;flex-direction:column;align-items:center;gap:6px;
        padding:10px 4px 8px;border-radius:10px;
        border:1px solid transparent;
        transition:background var(--d) var(--e),border-color var(--d) var(--e),transform .18s var(--es);
        position:relative;overflow:hidden;
    }
    .sw::after{
        content:'';position:absolute;inset:0;border-radius:10px;
        background:radial-gradient(circle at center,rgba(0,0,0,.06),transparent 70%);
        opacity:0;transition:opacity .15s;
    }
    .sw:active::after{opacity:1}
    .sw:hover{background:var(--s1);transform:translateY(-1px)}
    .sw:active{transform:translateY(0) scale(.97)}
    .sw.on{background:var(--s2);border-color:var(--b2)}

    .orb{
        width:38px;height:38px;border-radius:50%;position:relative;
        transition:transform .3s var(--es);flex-shrink:0;
        border:1px solid rgba(0,0,0,.12);
        box-shadow:none;
    }
    .orb::before{display:none}
    .orb-brilliant,.orb-matte{
        box-shadow:none;
    }
    .sw:hover .orb-brilliant,.sw:hover .orb-matte{box-shadow:none}
    .sw.on .orb-brilliant,.sw.on .orb-matte{box-shadow:none}
    .orb::after{
        content:'';position:absolute;inset:-5px;border-radius:50%;
        border:2px solid transparent;
        transition:border-color .25s var(--e),box-shadow .25s var(--e),transform .3s var(--es);
    }
    .sw:hover .orb{transform:scale(1.1)}
    .sw.on .orb{transform:scale(1.06)}
    .sw.on .orb::after{border-color:rgba(0,0,0,.26);box-shadow:0 0 0 2px rgba(0,0,0,.05)}

    .chk{
        position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
        opacity:0;transform:scale(.3) rotate(-20deg);
        transition:opacity .25s var(--e),transform .35s var(--es);
    }
    .chk svg{width:13px;height:13px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.6))}
    .sw.on .chk{opacity:1;transform:scale(1) rotate(0)}

    .sw-lbl{display:none}

    /* ─── CTA / Next button ─── */
    .btn-go{
        width:100%;padding:11px 14px;
        background:var(--t1);color:#fff;
        border-radius:10px;
        font-size:9px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;
        display:flex;align-items:center;justify-content:center;gap:7px;
        transition:opacity .2s,transform .18s var(--es),box-shadow .2s;
        box-shadow:0 2px 8px rgba(0,0,0,.14);
    }
    .btn-go:hover{opacity:.87;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.16)}
    .btn-go:active{transform:translateY(0) scale(.98);opacity:1;box-shadow:0 1px 4px rgba(0,0,0,.1)}
    .btn-go-arrow{transition:transform .2s var(--es)}
    .btn-go:hover .btn-go-arrow{transform:translateX(3px)}

    /* ─── Mobile nav inside panel (hidden on desktop) ─── */
    .mob-nav{display:none}

    /* ─── Global keyframes ─── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes orbIn{
        0%{opacity:0;transform:translateY(5px) scale(.85)}
        60%{transform:translateY(-1px) scale(1.03)}
        100%{opacity:1;transform:translateY(0) scale(1)}
    }
    .sw{animation:orbIn .18s var(--es) both}

    /* ─── Breakpoints ─── */
    @media(min-width:1200px){.panel{width:268px}}
    @media(max-width:1100px){.panel{width:244px;right:12px;top:12px}}

    /* ══════════════════════════════════
       ─── MOBILE (≤768px) ───
       ══════════════════════════════════ */
    @media(max-width:768px){
        .handle{display:flex}

        /* Top tabs: compact */
        .top-tabs{top:max(12px,env(safe-area-inset-top,12px));border-radius:10px}
        .top-tab{padding:10px 20px;font-size:7.5px;letter-spacing:1.5px;min-height:38px}

        /* External bottom bar + anim bar: more space from bottom on mobile */
        .bottom-bar,.anim-bar{
            bottom:max(28px,calc(var(--sab) + 20px));
        }
        .bottom-bar{
            gap:5px;
            flex-wrap:nowrap;
            max-width:calc(100vw - 24px);
        }
        .anim-bar{
            flex-wrap:nowrap;
            gap:5px;
            max-width:calc(100vw - 24px);
        }
        .anim-btn{
            padding:10px 14px;font-size:7px;letter-spacing:1px;
            min-height:36px;flex-shrink:0;white-space:nowrap;
        }
        .cat-pill{
            padding:10px 14px;font-size:7px;letter-spacing:1px;
            min-height:36px;
            flex:1;text-align:center;
            white-space:nowrap;
        }

        /* Panel → bottom sheet */
        .panel{
            position:fixed!important;
            top:auto!important;right:0!important;left:0!important;bottom:0!important;
            width:100%!important;height:auto;
            max-height:46vh;
            border-radius:20px 20px 0 0;border-bottom:none;
            padding-bottom:var(--sab);
            background:rgba(255,255,255,.97);
            backdrop-filter:blur(16px);
            -webkit-backdrop-filter:blur(16px);
            transition:transform .22s var(--e),opacity .18s var(--e);
            box-shadow:0 -2px 0 rgba(0,0,0,.04),0 -8px 24px rgba(0,0,0,.08);
            border:none;
        }
        .panel.show{animation:sheetIn .22s var(--e) both}
        @keyframes sheetIn{
            from{transform:translateY(100%)}
            to{transform:translateY(0)}
        }
        .panel.off{transform:translateY(100%);opacity:0;pointer-events:none}

        /* Drag handle */
        .handle{padding:10px 0 4px}
        .handle-pill{width:36px;height:4px;border-radius:4px;background:rgba(0,0,0,.1)}

        .panel-header{padding:4px 16px 0}
        .ph-row{margin-bottom:2px}
        .ph-title{font-size:12px;letter-spacing:1.2px}
        .btn-close{width:32px;height:32px}
        .btn-close svg{width:16px;height:16px}

        .panel-sub{padding:0 16px 8px}
        .ps-label{font-size:11px}
        .ps-value{font-size:11px}

        .divider{margin:0 16px}

        .scroll{padding:10px 16px 6px}

        /* Color grid: 4 columns on mobile (sin labels = más compacto) */
        .grid{grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:6px}
        .sw{padding:8px 2px 7px;gap:0;border-radius:10px;min-height:40px}
        .orb{width:30px;height:30px}
        .orb::before{top:3px;left:4px}
        .orb::after{inset:-3px}
        .chk svg{width:11px;height:11px}
        @keyframes orbIn{
            0%{opacity:0;transform:scale(.8)}
            100%{opacity:1;transform:scale(1)}
        }

        /* Next button */
        .btn-go{padding:11px;font-size:9px;letter-spacing:1.5px;border-radius:10px;min-height:42px}

        /* Mobile nav: category pills inside sheet */
        .mob-nav{
            display:flex;flex-direction:column;gap:8px;
            padding:8px 16px calc(8px + var(--sab));
            flex-shrink:0;
        }
        .mob-cats{
            display:flex;gap:5px;
            overflow-x:auto;scrollbar-width:none;
            -webkit-overflow-scrolling:touch;
            padding-bottom:2px;
        }
        .mob-cats::-webkit-scrollbar{display:none}
        .mob-cat{
            padding:9px 0;flex:1;min-width:0;
            border:1px solid var(--b2);border-radius:100px;
            font-size:7.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
            color:var(--t1);background:var(--panel);
            text-align:center;white-space:nowrap;
            transition:all var(--d) var(--e);
            min-height:36px;
        }
        .mob-cat:active{transform:scale(.96)}
        .mob-cat.on{background:var(--t1);color:#fff;border-color:var(--t1)}

        /* Toast above bottom bar */
        .toast{bottom:calc(70px + var(--sab));font-size:11px;padding:8px 16px 8px 12px}
    }

    /* ─── Mobile landscape ─── */
    @media(max-width:768px) and (orientation:landscape){
        .panel{
            left:auto!important;right:0!important;
            top:0!important;width:44%!important;
            max-height:100vh;max-height:100dvh;
            border-radius:20px 0 0 20px;
            background:rgba(255,255,255,.97);
        }
        .panel.off{transform:translateX(100%)}
        .panel.show{animation:panelSlideIn .38s var(--e) both}
        @keyframes panelSlideIn{
            from{transform:translateX(100%)}
            to{transform:translateX(0)}
        }
        .handle{display:none}
        .grid{grid-template-columns:repeat(3,1fr)}
        .mob-nav{padding-bottom:8px}
    }

    /* ─── Very small screens ─── */
    @media(max-width:390px){
        .panel{max-height:62vh}
        .orb{width:32px;height:32px}
        .sw-lbl{font-size:7px}
        .cat-pill{padding:8px 10px;font-size:6.5px}
        .mob-cat{font-size:7px;padding:8px 0}
        .top-tab{padding:9px 16px;font-size:7px}
        .grid{gap:4px}
    }

    /* ─── Tiny screens (SE, 5s) ─── */
    @media(max-width:340px){
        .panel{max-height:65vh}
        .grid{grid-template-columns:repeat(3,1fr);gap:3px}
        .orb{width:28px;height:28px}
        .sw{padding:8px 2px 6px;gap:4px}
        .sw-lbl{font-size:6.5px}
        .top-tab{padding:8px 12px;font-size:6.5px;letter-spacing:1px}
        .mob-cat{font-size:6.5px;letter-spacing:.8px}
    }

    /* ─── Tall phones: allow more sheet space ─── */
    @media(max-width:768px) and (min-height:800px){
        .panel{max-height:50vh}
    }
    </style>
</head>
<body>

<div class="loader" id="ld">
    <div class="ld-bw"><div class="ld-b"></div></div>
</div>

<div id="container3d_replace"></div>
<div class="toast" id="toast"><span class="toast-dot"></span><span id="toast-msg"></span></div>

<div class="ui">
    <!-- Top tabs: Configurator / Animations -->
    <div class="top-tabs" id="top-tabs">
        <button class="top-tab on" data-mode="configurator">Configurator</button>
        <button class="top-tab" data-mode="animations">Animations</button>
    </div>

    <!-- Bottom category bar (desktop, also mobile when panel closed) -->
    <div class="bottom-bar" id="bottom-bar"></div>

    <!-- Animation action buttons (visible only in animations mode) -->
    <div class="anim-bar hide" id="anim-bar"></div>

    <!-- Color picker panel -->
    <div class="panel off" id="pnl">
        <div class="handle" id="hnd">
            <div class="handle-pill"></div>
        </div>

        <div class="panel-header">
            <div class="ph-row">
                <span class="ph-title" id="htl">BODY COLOR</span>
                <button class="btn-close" id="bx" aria-label="Close panel">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="panel-sub">
            <span class="ps-label">Select Color</span>
            <span class="ps-value" id="ps-val">ALUMINIUM</span>
        </div>

        <div class="divider"></div>

        <div class="scroll" id="scroll-cfg">
            <div class="grid" id="cg"></div>
            <button class="btn-go" id="bn">
                <span id="bn-txt">Next</span>
                <span class="btn-go-arrow">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
                </span>
            </button>
        </div>

// ══════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════
var ANNOTATION_MODIFIERS = {

    'Close': 'close',

    'Retract handle': 'retract_handle',
    'Wheel spinner on': 'wheel_spinner_on',

    'dim1': 'dim-on',

    'dim3': 'dim-z-on'
};

// Lista de todas las anotaciones
var ANNOTATION_NAMES = Object.keys(ANNOTATION_MODIFIERS);

// Anotaciones principales para intercambio
var MAIN_ANNOTATIONS = ['Open', 'Close', 'Extend handle', 'Retract handle', 'Wheel spinner on', 'Wheel spinner off'];

// Anotaciones iniciales para modo animations
var INITIAL_ANNOTATIONS = ['Open', 'Extend handle', 'Wheel spinner on', 'open locker', 'dim1', 'dim2', 'dim3'];

// ══════════════════════════════════════════════════════════════
// ESTADO Y VARIABLES GLOBALES
// ══════════════════════════════════════════════════════════════

var CATEGORIES = ['body', 'handles', 'corners', 'wheels'];
var TITLES = {body:'Body Color', handles:'Handles', corners:'Corners', wheels:'Wheels'};

var currentCategoryIndex = 0;
var isReady = false;
var isPanelOpen = false;
var currentMode = 'configurator';
var isMobile = false;
var activeCameraName = '';
var _loadingSetupDone = false;

// Estado de selección de materiales
var selectedMaterials = {
    body: 'aluminium',
    handles: 'aluminium',
    corners: 'aluminium',
    wheels: 'aluminium'
};

// ══════════════════════════════════════════════════════════════
// INICIALIZACIÓN SDK DE UNLIMITED3D - VERSIÓN ULTRA VISIBLE
// ══════════════════════════════════════════════════════════════

var sdkOptions = {
    distID: 'latest',
    solution3DName: 'suitcase-color',
    projectName: 'resources-for-videos-and-marketing-purposes',
    solution3DID: '62766',
    workspaceID: '93698',
    containerID: 'container3d_replace',

    onLoadingChanged: function(data) {
        var isDone = data === false ||
                     (data && data.totalAssets > 0 && data.loadedAssets === data.totalAssets);
        if (isDone && !_loadingSetupDone) {
            _loadingSetupDone = true;

            applyCameraSettings();
            Unlimited3D.activateModifier({ modifier: 'annotations_pop_out' });
            setTimeout(function() {
                Unlimited3D.hideAnnotations({
                    annotations: ['Close', 'Retract handle', 'Wheel spinner off', 'close locker']
                });
            }, 400);
        }
    },

    // onTrigger para notificaciones de UI solamente.
    // NO llamamos activateModifier aquí — el SDK maneja las animaciones y
    // el AnnotationState machine nativamente cuando el usuario clica una anotación.
    onTrigger: function(e) {
        if (e && e.type === 'PointerClicked' && e.data && e.data[0]) {
            var obj = e.data[0];
            var name = obj.shortName || obj.name;
            if (name) handleAnnotationClick(name);
        }
    }
};

Unlimited3D.init(sdkOptions);
window.addEventListener('Unlimited3DReady', initializeApp);

var bootTimeout = setTimeout(function() {
    if (!isReady) initializeApp();
}, 5000);

// ══════════════════════════════════════════════════════════════
// FUNCIONES PARA ANOTACIONES
// ══════════════════════════════════════════════════════════════

function initializeApp() {
    if (isReady) return;
    isReady = true;
    clearTimeout(bootTimeout);
    
    isMobile = checkIfMobile();
    
    activateCorrectCamera(function() {
        setDefaultCameraModifier();
        if (isPanelOpen) {
            var cat = CATEGORIES[currentCategoryIndex];
            setCategoryCamera(cat);
        }
    });
    
    document.getElementById('ld').classList.add('hide');
    sendConfigurationToParent();
}

// ─── Estado de los botones de acción de animaciones ───
var animState = {
    suitcase: 'closed',   // 'closed' | 'open'
    handle:   'retracted',// 'retracted' | 'extended'
    wheel:    'off'       // 'off' | 'on'
};

// Configuración de cada botón de acción
var ANIM_ACTIONS = [
    {
        id: 'btn-suitcase',
        states: {
            closed:   { label: 'Open',           modifier: 'open',            next: 'open' },
            open:     { label: 'Close',           modifier: 'close',           next: 'closed' }
        },
        stateKey: 'suitcase'
    },
    {
        id: 'btn-handle',
        states: {
            retracted:{ label: 'Extend handle',  modifier: 'extend_handle',   next: 'extended' },
            extended: { label: 'Retract handle', modifier: 'retract_handle',  next: 'retracted' }
        },
        stateKey: 'handle'
    },
    {
        id: 'btn-wheel',
        states: {
            off:      { label: 'Wheel spinner on',  modifier: 'wheel_spinner_on',  next: 'on' },
            on:       { label: 'Wheel spinner off', modifier: 'wheel_spinner_off', next: 'off' }
        },
        stateKey: 'wheel'
    },
];

function buildAnimBar() {
    var bar = document.getElementById('anim-bar');
    bar.innerHTML = '';

    ANIM_ACTIONS.forEach(function(action) {
        var btn = document.createElement('button');
        btn.className = 'anim-btn';
        btn.id = action.id;
        var currentState = animState[action.stateKey];
        btn.textContent = action.states[currentState].label;

        btn.addEventListener('click', function() {
            var state = animState[action.stateKey];
            var cfg = action.states[state];

            Unlimited3D.activateModifier({ modifier: cfg.modifier });
            animState[action.stateKey] = cfg.next;

            // Actualizar label del botón
            var newCfg = action.states[cfg.next];
            btn.textContent = newCfg.label;

            // Feedback visual breve
            btn.classList.add('active');
            setTimeout(function() { btn.classList.remove('active'); }, 400);
        });

        bar.appendChild(btn);
    });
}

var _lastAnnotationClick = '';
var _lastAnnotationTime = 0;

function handleAnnotationClick(annotationName) {
    if (!annotationName) return;

    var now = Date.now();
    if (annotationName === _lastAnnotationClick && now - _lastAnnotationTime < 500) return;
    _lastAnnotationClick = annotationName;
    _lastAnnotationTime = now;

    // Mapear click de anotación 3D al botón correspondiente y activarlo
    var annotToAction = {
        'Open': 'btn-suitcase',
        'Close': 'btn-suitcase',
        'Extend handle': 'btn-handle',
        'Retract handle': 'btn-handle',
        'Wheel spinner on': 'btn-wheel',
        'Wheel spinner off': 'btn-wheel',
        'open locker': null,
        'close locker': null
    };

    var btnId = annotToAction[annotationName];
    if (btnId) {
        var btn = document.getElementById(btnId);
        if (btn) btn.click();
    }
}

function showAnnotation(annotationName) {
    try {
        Unlimited3D.showAnnotations({ annotations: [annotationName] });
    } catch(e) {}
}

function hideAnnotation(annotationName) {
    try {
        Unlimited3D.hideAnnotations({ annotations: [annotationName] });
    } catch(e) {}
}

function showInitialAnnotations() {
    if (currentMode !== 'animations') return;
    
    setTimeout(function() {
        INITIAL_ANNOTATIONS.forEach(function(name) {
            showAnnotation(name);
        });
    }, 500);
}

function hideAllAnnotations() {
    ANNOTATION_NAMES.forEach(function(annName) {
        hideAnnotation(annName);
    });
}

// ══════════════════════════════════════════════════════════════
// RESTO DEL CÓDIGO (CÁMARAS, MATERIALES, UI) - SIN CAMBIOS
// ══════════════════════════════════════════════════════════════

function checkIfMobile() {
    return window.matchMedia('(max-width:768px)').matches;
}

function activateCorrectCamera(callback) {
    isMobile = checkIfMobile();
    var cameraName = isMobile ? 'Camera Mobile' : 'Camera Desktop';
    
    if (activeCameraName === cameraName) {
        if (callback) callback();
        return;
    }
    
    activeCameraName = cameraName;
    
    try {
        Unlimited3D.activateCamera({name: cameraName}, function(err) {
            if (err) {}
            
            try {
                Unlimited3D.activateCameraControl({name: cameraName});
            } catch(e) {}
            
            if (callback) callback();
        });
    } catch(e) {
        if (callback) callback();
    }
}

function setDefaultCameraModifier() {
    isMobile = checkIfMobile();
    var modifier = isMobile ? 'default_camera_mobile' : 'default_camera_desktop';
    
    activateCorrectCamera(function() {
        activateModifier(modifier);
        applyCameraSettings();
    });
}

function setCategoryCamera(category) {
    isMobile = checkIfMobile();
    var camMod = CAMERA_MODIFIERS[category];
    if (!camMod) return;
    
    var modifier = isMobile ? camMod.mobile : camMod.desktop;
    
    activateCorrectCamera(function() {
        activateModifier(modifier);
        applyCameraSettings();
    });
}

function activateModifier(modifierName) {
    if (!isReady) return;
    
    try {
        Unlimited3D.activateModifier({modifier: modifierName});
    } catch(e) {}
}

function applyCameraSettings() {
    try {
        if (Unlimited3D.setCameraControlsSettings) {
            Unlimited3D.setCameraControlsSettings({
                enableZoom: true,
                enablePan: false,
                enableRotate: true,
                minDistance: 6,
                maxDistance: 8,
                dampingFactor: 0.15,
                minPolarAngle: 0.5,
                maxPolarAngle: 1.7
            });
        }
    } catch(e) {}
}

// CAMBIO DE MATERIALES
function changeMaterial(category, materialName, callback) {
    var parts = PARTS[category];
    if (!parts) return;
    
    Unlimited3D.changeMaterial({parts: parts, material: materialName}, function(err) {
        if (!err) {
            if (callback) callback();
            return;
        }
        
        Unlimited3D.changeMaterials({
            partObjects: [{parts: parts, material: materialName}]
        }, function(err2) {
            if (callback) callback();
        });
    });
}

function selectMaterial(category, material) {
    changeMaterial(category, material.name);
    selectedMaterials[category] = material.key;
    
    if (category === 'body') {
        var defaultMat = OTHER_MATERIALS[0];
        ['handles', 'corners', 'wheels'].forEach(function(cat) {
            selectedMaterials[cat] = 'aluminium';
            changeMaterial(cat, defaultMat.name);
        });
    }
    
    updateUI();
    sendConfigurationToParent();
}

// INTERFAZ DE USUARIO
function buildCategoryButtons() {
    var container = document.getElementById('bottom-bar');
    container.innerHTML = '';
    
    CATEGORIES.forEach(function(cat, index) {
        var btn = document.createElement('button');
        btn.className = 'cat-pill' + (isPanelOpen && index === currentCategoryIndex ? ' on' : '');
        btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        btn.addEventListener('click', function() {
            if (currentMode !== 'configurator') return;
            openPanel(index);
        });
        container.appendChild(btn);
    });
}

function buildMobileCategoryButtons() {
    var container = document.getElementById('mob-cats');
    if (!container) return;
    container.innerHTML = '';
    
    CATEGORIES.forEach(function(cat, index) {
        var btn = document.createElement('button');
        btn.className = 'mob-cat' + (isPanelOpen && index === currentCategoryIndex ? ' on' : '');
        btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        btn.addEventListener('click', function() {
            if (currentMode !== 'configurator') return;
            openPanel(index);
        });
        container.appendChild(btn);
    });
}

function renderColorGrid() {
    var grid = document.getElementById('cg');
    grid.style.opacity = '0';
    grid.style.transform = 'translateY(4px)';
    
    setTimeout(function() {
        grid.innerHTML = '';
        
        var category = CATEGORIES[currentCategoryIndex];
        var materials;
        
        if (category === 'body') {
            materials = BODY_MATERIALS;
        } else {
            var bodyColor = selectedMaterials.body;
            var allowedKeys = DEPENDENCIES[bodyColor] || DEPENDENCIES.aluminium;
            materials = OTHER_MATERIALS.filter(function(mat) {
                return allowedKeys.indexOf(mat.key) !== -1;
            });
        }
        
        var orbClass = category === 'body' ? 'orb orb-brilliant' : 'orb orb-matte';
        materials.forEach(function(mat, index) {
            var btn = document.createElement('button');
            btn.className = 'sw' + (selectedMaterials[category] === mat.key ? ' on' : '');
            btn.style.animationDelay = (index * 0.025) + 's';
            btn.setAttribute('aria-label', mat.label);
            btn.innerHTML = '<div class="' + orbClass + '" style="background:' + mat.gradient + '">' +
                           '<div class="chk">' + ICO.check + '</div></div>' +
                           '<span class="sw-lbl">' + mat.label + '</span>';
            btn.addEventListener('click', function() {
                selectMaterial(category, mat);
            });
            grid.appendChild(btn);
        });
        
        requestAnimationFrame(function() {
            grid.style.opacity = '1';
            grid.style.transform = 'translateY(0)';
        });
    }, 40);
}

function openPanel(categoryIndex) {
    currentCategoryIndex = categoryIndex;
    isPanelOpen = true;
    isMobile = checkIfMobile();
    
    var panel = document.getElementById('pnl');
    panel.classList.remove('off');
    panel.classList.add('show');
    
    var category = CATEGORIES[categoryIndex];
    document.getElementById('htl').textContent = TITLES[category];
    
    setCategoryCamera(category);
    
    if (isMobile) {
        document.getElementById('bottom-bar').classList.add('hide');
    }
    
    updateUI();
}

function closePanel() {
    isPanelOpen = false;
    isMobile = checkIfMobile();
    
    var panel = document.getElementById('pnl');
    panel.classList.remove('show');
    panel.classList.add('off');
    
    if (isMobile && currentMode === 'configurator') {
        document.getElementById('bottom-bar').classList.remove('hide');
    }
    
    updateUI();
    
    if (currentMode === 'configurator') {
        setDefaultCameraModifier();
    }
}

function updateNextButton() {
    var nextIndex = (currentCategoryIndex + 1) % CATEGORIES.length;
    var nextCat = CATEGORIES[nextIndex];
    var label = nextCat.charAt(0).toUpperCase() + nextCat.slice(1);
    document.getElementById('bn-txt').textContent = 'Next: ' + label;
}

function updateSelectedValue() {
    var category = CATEGORIES[currentCategoryIndex];
    var materials = category === 'body' ? BODY_MATERIALS : OTHER_MATERIALS;
    var selectedMat = materials.find(function(m) {
        return m.key === selectedMaterials[category];
    });
    document.getElementById('ps-val').textContent = selectedMat ? selectedMat.label.toUpperCase() : 'ALUMINIUM';
}

function updateUI() {
    buildCategoryButtons();
    buildMobileCategoryButtons();
    renderColorGrid();
    updateNextButton();
    updateSelectedValue();
}

function switchMode(mode) {
    currentMode = mode;
    isMobile = checkIfMobile();
    
    document.querySelectorAll('.top-tab').forEach(function(tab) {
        tab.classList.toggle('on', tab.getAttribute('data-mode') === mode);
    });
    
    var bottomBar = document.getElementById('bottom-bar');
    
    var animBar = document.getElementById('anim-bar');

    if (mode === 'configurator') {
        animBar.classList.add('hide');
        closePanel();
        buildCategoryButtons();
        bottomBar.classList.remove('hide');
        hideAllAnnotations();
    } else {
        bottomBar.classList.add('hide');
        closePanel();
        setDefaultCameraModifier();
        // Resetear estado de botones al entrar en animations
        animState.suitcase = 'closed';
        animState.handle   = 'retracted';
        animState.wheel    = 'off';
        buildAnimBar();
        animBar.classList.remove('hide');
        // Reactivar anotaciones 3D (restaurarlas si venían ocultas desde configurator)
        Unlimited3D.activateModifier({ modifier: 'annotations_pop_out' });
        setTimeout(function() {
            INITIAL_ANNOTATIONS.forEach(function(name) {
                showAnnotation(name);
            });
            Unlimited3D.hideAnnotations({
                annotations: ['Close', 'Retract handle', 'Wheel spinner off', 'close locker']
            });
        }, 400);
    }
}

// UTILIDADES
var toastTimeout;
function showToast(message) {
    var toast = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = message;
    toast.classList.add('show');
    
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(function() {
        toast.classList.remove('show');
    }, 2200);
}

function sendConfigurationToParent() {
    if (window.parent && window.parent !== window) {
        var bodyMat = BODY_MATERIALS.find(function(m) { return m.key === selectedMaterials.body; });
        var handlesMat = OTHER_MATERIALS.find(function(m) { return m.key === selectedMaterials.handles; });
        var cornersMat = OTHER_MATERIALS.find(function(m) { return m.key === selectedMaterials.corners; });
        var wheelsMat = OTHER_MATERIALS.find(function(m) { return m.key === selectedMaterials.wheels; });
        
        var readable = {
            body: bodyMat ? bodyMat.label : 'Aluminium',
            handles: handlesMat ? handlesMat.label : 'Aluminium',
            corners: cornersMat ? cornersMat.label : 'Aluminium',
            wheels: wheelsMat ? wheelsMat.label : 'Aluminium'
        };
        
        window.parent.postMessage({
            type: 'CONFIG_UPDATE',
            payload: selectedMaterials,
            readable: readable,
            timestamp: Date.now()
        }, '*');
    }
}

// EVENT LISTENERS
document.querySelectorAll('.top-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
        switchMode(tab.getAttribute('data-mode'));
    });
});

document.getElementById('bn').addEventListener('click', function() {
    currentCategoryIndex = (currentCategoryIndex + 1) % CATEGORIES.length;
    openPanel(currentCategoryIndex);
});

document.getElementById('bx').addEventListener('click', function() {
    closePanel();
});

// Mobile swipe-to-dismiss
(function() {
    var handle = document.getElementById('hnd');
    var startY = 0, currentY = 0, dragging = false;
    
    function onStart(e) {
        if (!checkIfMobile() || !isPanelOpen) return;
        dragging = true;
        startY = e.touches ? e.touches[0].clientY : e.clientY;
        currentY = startY;
        document.getElementById('pnl').style.transition = 'none';
        handle.classList.add('dragging');
    }
    
    function onMove(e) {
        if (!dragging) return;
        currentY = e.touches ? e.touches[0].clientY : e.clientY;
        var deltaY = Math.max(0, currentY - startY);
        document.getElementById('pnl').style.transform = 'translateY(' + deltaY + 'px)';
    }
    
    function onEnd() {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.getElementById('pnl').style.transition = '';
        
        var deltaY = currentY - startY;
        if (deltaY > 60) {
            closePanel();
        } else {
            document.getElementById('pnl').style.transform = '';
        }
    }
    
    handle.addEventListener('touchstart', onStart, {passive: true});
    handle.addEventListener('touchmove', onMove, {passive: true});
    handle.addEventListener('touchend', onEnd);
    handle.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
})();

function handleViewportChange() {
    var wasMobile = isMobile;
    isMobile = checkIfMobile();
    
    if (wasMobile !== isMobile) {
        activeCameraName = '';
        activateCorrectCamera(function() {
            if (isPanelOpen) {
                setCategoryCamera(CATEGORIES[currentCategoryIndex]);
            } else {
                setDefaultCameraModifier();
            }
        });
        
        if (!isMobile && isPanelOpen) {
            document.getElementById('bottom-bar').classList.remove('hide');
        }
        if (isMobile && isPanelOpen) {
            document.getElementById('bottom-bar').classList.add('hide');
        }
        
        updateUI();
    }
}

window.addEventListener('resize', handleViewportChange);
window.addEventListener('orientationchange', function() {
    setTimeout(handleViewportChange, 150);
});

setInterval(sendConfigurationToParent, 5000);

if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').catch(function() {});
    });
}

buildCategoryButtons();
buildMobileCategoryButtons();
renderColorGrid();

return Object.freeze({
    get state() {
        return Object.assign({}, selectedMaterials);
    },
    get readable() {
        var bodyMat = BODY_MATERIALS.find(function(m) { return m.key === selectedMaterials.body; });
        var handlesMat = OTHER_MATERIALS.find(function(m) { return m.key === selectedMaterials.handles; });
        var cornersMat = OTHER_MATERIALS.find(function(m) { return m.key === selectedMaterials.corners; });
        var wheelsMat = OTHER_MATERIALS.find(function(m) { return m.key === selectedMaterials.wheels; });
        
        return {
            body: bodyMat ? bodyMat.label : 'Aluminium',
            handles: handlesMat ? handlesMat.label : 'Aluminium',
            corners: cornersMat ? cornersMat.label : 'Aluminium',
            wheels: wheelsMat ? wheelsMat.label : 'Aluminium'
        };
    }
});

})();
</script>
</body>
</html>
