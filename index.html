<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsa - Suitcase Configurator FINAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        
        #container3d_replace {
            position: fixed;
            inset: 0;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            color: #000;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 9999;
        }
        
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

<div id="container3d_replace"></div>
<div class="toast" id="toast"></div>

<script src="https://distcdn.unlimited3d.com/pres/v/2.10.0/unlimited3d.min.js"></script>
<script>
// ✅ USAR EL WORKSPACE "next" (ID: 93698) - Este tiene las anotaciones
var options = {
    distID: 'latest',
    solution3DName: 'suitcase-color',
    projectName: 'resources-for-videos-and-marketing-purposes',
    solution3DID: '62766',
    workspaceID: '93698',  // ← CRÍTICO: workspace "next"
    containerID: 'container3d_replace',
    onLoadedCB: onModelLoaded
};

function onModelLoaded() {
    console.log('✅ Model loaded with annotations');
    
    // Esperar un momento para que todo se inicialice
    setTimeout(setupAnnotationListeners, 1000);
}

function setupAnnotationListeners() {
    console.log('🎯 Setting up annotation click listeners...');
    
    // ✅ MÉTODO 1: Escuchar clicks en elementos con class "annotation"
    document.addEventListener('click', function(e) {
        // Buscar si el click fue en una anotación o sus hijos
        var target = e.target;
        var annotation = target.closest('[class*="annotation"]') || 
                        target.closest('[class*="hotspot"]') ||
                        target.closest('[data-annotation]');
        
        if (annotation) {
            var text = annotation.textContent || annotation.innerText || '';
            console.log('🎯 Annotation clicked:', text);
            handleAnnotationClick(text.trim());
        }
    }, true); // useCapture = true
    
    // ✅ MÉTODO 2: Unlimited3D API
    if (typeof Unlimited3D.onAnnotationClick !== 'undefined') {
        Unlimited3D.onAnnotationClick = function(name) {
            console.log('🎯 API annotation clicked:', name);
            handleAnnotationClick(name);
        };
    }
    
    console.log('✓ Listeners ready');
}

function handleAnnotationClick(text) {
    var modifier = null;
    var displayName = text;
    
    // Mapeo de texto → modificadores (puedes ajustar según tus anotaciones)
    var lowerText = text.toLowerCase();
    
    if (lowerText.includes('open')) {
        modifier = 'open';
        displayName = 'Open';
    } else if (lowerText.includes('close')) {
        modifier = 'close';
        displayName = 'Close';
    } else if (lowerText.includes('extend')) {
        modifier = 'extend_handle';
        displayName = 'Extend Handle';
    } else if (lowerText.includes('retract')) {
        modifier = 'retract_handle';
        displayName = 'Retract Handle';
    } else if (lowerText.includes('spinner') && lowerText.includes('on')) {
        modifier = 'wheel_spinner_on';
        displayName = 'Wheel Spinner On';
    } else if (lowerText.includes('spinner') && (lowerText.includes('off') || lowerText.includes('stop'))) {
        modifier = 'wheel_spinner_off';
        displayName = 'Wheel Spinner Off';
    }
    
    if (modifier) {
        console.log('✓ Activating modifier:', modifier);
        try {
            Unlimited3D.activateModifier({modifier: modifier});
            showToast('🎬 ' + displayName);
        } catch(e) {
            console.error('✗ Error activating modifier:', e);
        }
    } else {
        console.log('⚠️ No modifier found for:', text);
    }
}

function showToast(msg) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function() {
        toast.classList.remove('show');
    }, 2000);
}

// Initialize
Unlimited3D.init(options);

console.log('🚀 Configurator initialized');
console.log('📍 Using workspace ID: 93698 (next)');
console.log('👆 Click on annotation hotspots in the 3D model to trigger animations');
</script>

</body>
</html>
