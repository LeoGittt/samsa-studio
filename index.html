<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
    <title>Samsa Studio | Suitcase Configurator</title>
    <meta name="description" content="Customize your premium suitcase in 3D.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://distcdn.unlimited3d.com">
    <link rel="preconnect" href="https://dist.unlimited3d.com">
    <link rel="dns-prefetch" href="https://distcdn.unlimited3d.com">
    <link rel="dns-prefetch" href="https://dist.unlimited3d.com">
    <link rel="preload" href="https://distcdn.unlimited3d.com/pres/v/2.10.0/unlimited3d.min.js" as="script" fetchpriority="high">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
    <style>
    :root{
        --bg:#f5f5f3;
        --panel:#fff;
        --b1:rgba(0,0,0,.07);
        --b2:rgba(0,0,0,.13);
        --b3:rgba(0,0,0,.22);
        --s1:rgba(0,0,0,.025);
        --s2:rgba(0,0,0,.05);
        --s3:rgba(0,0,0,.08);
        --t1:rgba(0,0,0,.88);
        --t2:rgba(0,0,0,.44);
        --t3:rgba(0,0,0,.26);
        --e:cubic-bezier(0.22,1,0.36,1);
        --es:cubic-bezier(0.34,1.56,0.64,1);
        --ep:cubic-bezier(0.4,0,0.2,1);
        --d:0.24s;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:var(--bg);color:var(--t1);
        font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
        font-size:13px;line-height:1.5;overflow:hidden;
        -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    button{font-family:inherit;cursor:pointer;outline:none;-webkit-tap-highlight-color:transparent;border:none;background:none}
    button:focus-visible{box-shadow:0 0 0 2px rgba(0,0,0,.22)}

    /* ─── Loader ─── */
    .loader{
        position:fixed;inset:0;z-index:9999;background:var(--bg);
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
        transition:opacity .5s var(--e),visibility .5s;
    }
    .loader.hide{opacity:0;visibility:hidden;pointer-events:none}
    .ld-bw{width:80px;height:1px;background:rgba(0,0,0,.07);border-radius:1px;overflow:hidden}
    .ld-b{height:100%;width:0%;background:var(--t1);border-radius:1px;animation:lp 2.2s var(--e) forwards}
    @keyframes lp{0%{width:0}25%{width:55%}60%{width:76%}85%{width:90%}100%{width:96%}}
    .loader.hide .ld-b{width:100%!important;transition:width .1s}

    /* ─── 3D Canvas ─── */
    #container3d_replace{position:fixed;inset:0;width:100%;height:100%}

    /* ─── UI shell ─── */
    .ui{position:fixed;inset:0;z-index:10;pointer-events:none}

    /* ─── Toast ─── */
    .toast{
        position:fixed;bottom:28px;left:50%;
        transform:translateX(-50%) translateY(16px);
        background:rgba(16,16,16,.93);color:#fff;
        padding:9px 18px 9px 14px;
        border-radius:100px;
        font-size:11.5px;font-weight:500;letter-spacing:.1px;
        display:flex;align-items:center;gap:8px;
        box-shadow:0 4px 20px rgba(0,0,0,.18);
        z-index:9998;pointer-events:none;
        transition:transform .38s var(--e),opacity .28s;
        opacity:0;white-space:nowrap;
    }
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .toast-dot{width:6px;height:6px;border-radius:50%;background:#fff;flex-shrink:0;opacity:.5}

    /* ─── Panel open btn (reopen) ─── */
    .panel-open-btn{
        pointer-events:auto;
        position:absolute;top:14px;right:14px;
        width:34px;height:34px;border-radius:10px;
        background:var(--panel);border:1px solid var(--b1);
        box-shadow:0 2px 10px rgba(0,0,0,.07);
        display:none;place-items:center;
        color:var(--t2);
        transition:background var(--d) var(--e),color var(--d) var(--e),transform .2s var(--es);
        cursor:pointer;
    }
    .panel-open-btn.show{display:grid}
    .panel-open-btn:hover{background:var(--s2);color:var(--t1);transform:scale(1.06)}
    .panel-open-btn:active{transform:scale(.94)}
    .pob-icon-desk{width:13px;height:13px}
    .pob-icon-mob,.pob-label{display:none}

    /* ─── Panel ─── */
    .panel{
        pointer-events:auto;
        position:absolute;top:14px;right:14px;width:256px;
        height:auto;max-height:calc(100vh - 28px);
        background:var(--panel);
        border:1px solid var(--b1);
        border-radius:16px;
        display:flex;flex-direction:column;
        overflow:hidden;
        box-shadow:0 2px 20px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.03);
        animation:panelIn .5s var(--e) .2s both;
        transition:transform .4s var(--e),opacity .28s var(--e);
        will-change:transform;
    }
    .panel.off{
        transform:translateX(calc(100% + 16px));
        opacity:0;pointer-events:none;
    }
    @keyframes panelIn{
        from{transform:translateX(20px);opacity:0}
        to{transform:translateX(0);opacity:1}
    }

    /* ─── Mobile drag handle ─── */
    .handle{
        display:none;
        flex-direction:column;align-items:center;
        width:100%;padding:10px 0 4px;
        background:none;flex-shrink:0;cursor:grab;
    }
    .handle:active{cursor:grabbing}
    .handle-pill{
        width:28px;height:3px;border-radius:3px;
        background:rgba(0,0,0,.1);
        transition:background .2s,width .2s var(--es);
    }
    .handle:active .handle-pill{background:rgba(0,0,0,.28)}

    /* ─── Panel header ─── */
    .panel-header{padding:10px 12px 0;flex-shrink:0}
    .ph-row{
        display:flex;align-items:center;justify-content:space-between;
        margin-bottom:10px;
    }
    .panel-label{
        font-size:6.5px;font-weight:700;letter-spacing:3px;
        text-transform:uppercase;color:var(--t3);
    }
    .btn-collapse{
        width:22px;height:22px;border-radius:6px;
        background:var(--s1);
        color:var(--t3);
        display:grid;place-items:center;
        transition:background var(--d) var(--e),color var(--d) var(--e),transform .18s var(--es);
    }
    .btn-collapse svg{width:11px;height:11px}
    .btn-collapse:hover{background:var(--s3);color:var(--t1);transform:scale(1.1)}
    .btn-collapse:active{transform:scale(.9)}

    /* ─── Category tabs ─── */
    .cats{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:0}
    .cat{
        padding:6px 2px 7px;
        border:1px solid transparent;border-radius:8px;
        display:flex;flex-direction:column;align-items:center;gap:4px;
        font-size:7px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;
        color:var(--t3);text-align:center;
        transition:all var(--d) var(--e);position:relative;
    }
    .cat:hover{background:var(--s1);color:var(--t2)}
    .cat.on{background:var(--s2);color:var(--t1);border-color:var(--b1)}

    /* ─── Divider ─── */
    .divider{height:1px;background:var(--b1);margin:0 12px;flex-shrink:0}

    /* ─── Scroll area ─── */
    .scroll{flex:1;overflow-y:auto;padding:12px 12px 14px;scrollbar-width:none}
    .scroll::-webkit-scrollbar{display:none}

    /* ─── Section header ─── */
    .hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .hd-left{}
    .hd-title{font-size:13px;font-weight:600;color:var(--t1);letter-spacing:-.1px;display:block}
    .hd-sub{font-size:8px;font-weight:400;color:var(--t3);letter-spacing:.2px;display:block;margin-top:1px}
    .btn-cam{
        width:26px;height:26px;border-radius:50%;
        background:var(--s1);color:var(--t3);
        display:grid;place-items:center;
        transition:background var(--d) var(--e),color var(--d) var(--e),transform .2s var(--es);
    }
    .btn-cam svg{width:12px;height:12px}
    .btn-cam:hover{background:var(--s3);color:var(--t1);transform:scale(1.1) rotate(-20deg)}
    .btn-cam:active{transform:scale(.9)}

    /* ─── Color grid ─── */
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px}
    .sw{
        display:flex;flex-direction:column;align-items:center;gap:6px;
        padding:10px 4px 8px;border-radius:10px;
        border:1px solid transparent;
        transition:background var(--d) var(--e),border-color var(--d) var(--e),transform .18s var(--es);
        position:relative;overflow:hidden;
    }
    .sw::after{
        content:'';position:absolute;inset:0;border-radius:10px;
        background:radial-gradient(circle at center,rgba(0,0,0,.06),transparent 70%);
        opacity:0;transition:opacity .15s;
    }
    .sw:active::after{opacity:1}
    .sw:hover{background:var(--s1);transform:translateY(-1px)}
    .sw:active{transform:translateY(0) scale(.97)}
    .sw.on{background:var(--s2);border-color:var(--b2)}

    /* orb */
    .orb{
        width:38px;height:38px;border-radius:50%;position:relative;
        transition:transform .3s var(--es),box-shadow .3s var(--e);flex-shrink:0;
        border:1px solid rgba(255,255,255,.12);
        box-shadow:0 5px 14px rgba(0,0,0,.28),0 2px 4px rgba(0,0,0,.18),inset 0 -3px 6px rgba(0,0,0,.14);
    }
    .orb::before{
        content:'';position:absolute;top:4px;left:6px;width:48%;height:30%;
        border-radius:50%;
        background:radial-gradient(ellipse at 45% 35%,rgba(255,255,255,.6),rgba(255,255,255,0) 70%);
        opacity:.75;pointer-events:none;
    }
    .orb::after{
        content:'';position:absolute;inset:-5px;border-radius:50%;
        border:2px solid transparent;
        transition:border-color .25s var(--e),box-shadow .25s var(--e),transform .3s var(--es);
    }
    .sw:hover .orb{transform:scale(1.1);box-shadow:0 8px 20px rgba(0,0,0,.26),0 2px 5px rgba(0,0,0,.16),inset 0 -3px 6px rgba(0,0,0,.11)}
    .sw.on .orb{transform:scale(1.06);box-shadow:0 7px 18px rgba(0,0,0,.3),0 2px 4px rgba(0,0,0,.18),inset 0 -3px 6px rgba(0,0,0,.14)}
    .sw.on .orb::after{border-color:rgba(0,0,0,.26);box-shadow:0 0 0 2px rgba(0,0,0,.05)}

    /* check */
    .chk{
        position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
        opacity:0;transform:scale(.3) rotate(-20deg);
        transition:opacity .25s var(--e),transform .35s var(--es);
    }
    .chk svg{width:13px;height:13px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.6))}
    .sw.on .chk{opacity:1;transform:scale(1) rotate(0)}

    /* label */
    .sw-lbl{
        font-size:8.5px;font-weight:500;color:var(--t3);
        text-align:center;letter-spacing:.1px;line-height:1.25;
        transition:color var(--d) var(--e),font-weight 0s;
    }
    .sw.on .sw-lbl{color:var(--t1);font-weight:600}

    /* ─── CTA button ─── */
    .btn-go{
        width:100%;padding:11px 14px;
        background:var(--t1);color:#fff;
        border-radius:10px;
        font-size:9px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;
        display:flex;align-items:center;justify-content:center;gap:7px;
        transition:opacity .2s,transform .18s var(--es),box-shadow .2s;
        box-shadow:0 2px 8px rgba(0,0,0,.14);
    }
    .btn-go:hover{opacity:.87;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.16)}
    .btn-go:active{transform:translateY(0) scale(.98);opacity:1;box-shadow:0 1px 4px rgba(0,0,0,.1)}
    .btn-go-arrow{transition:transform .2s var(--es)}
    .btn-go:hover .btn-go-arrow{transform:translateX(3px)}

    /* ─── Global keyframes ─── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes orbIn{
        0%{opacity:0;transform:translateY(5px) scale(.85)}
        60%{transform:translateY(-1px) scale(1.03)}
        100%{opacity:1;transform:translateY(0) scale(1)}
    }
    .sw{animation:orbIn .32s var(--es) both}

    /* ─── Breakpoints ─── */
    @media(min-width:1200px){.panel{width:268px}}
    @media(max-width:1100px){.panel{width:244px;right:12px;top:12px;bottom:12px}}

    /* ─── Mobile ─── */
    @media(max-width:768px){
        .handle{display:flex}
        .btn-collapse{display:none!important}

        /* Botón reabrir — pill pequeño centrado en la parte inferior */
        .panel-open-btn{
            display:none;
            position:fixed!important;
            bottom:14px;left:50%;right:auto;top:auto!important;
            transform:translateX(-50%);
            width:auto!important;height:22px!important;
            padding:0 10px;border-radius:100px!important;
            background:rgba(16,16,16,.55)!important;
            border:none!important;
            color:rgba(255,255,255,.9)!important;
            font-size:7px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
            gap:5px;align-items:center;
            box-shadow:0 1px 8px rgba(0,0,0,.12)!important;
            backdrop-filter:blur(8px);
            -webkit-backdrop-filter:blur(8px);
        }
        .panel-open-btn.show{display:flex}
        .pob-icon-desk{display:none}
        .pob-icon-mob{display:block;width:9px;height:9px}
        .pob-label{display:block}

        .panel{
            position:fixed!important;
            top:auto!important;right:0!important;left:0!important;bottom:0!important;
            width:100%!important;height:auto;
            max-height:48vh;
            border-radius:20px 20px 0 0;border-bottom:none;
            padding-bottom:env(safe-area-inset-bottom,0);
            background:rgba(255,255,255,.96);
            backdrop-filter:blur(24px);
            -webkit-backdrop-filter:blur(24px);
            transition:transform .4s var(--e),opacity .3s var(--e);
            box-shadow:0 -1px 0 rgba(0,0,0,.06),0 -8px 32px rgba(0,0,0,.07);
            animation:sheetIn .38s var(--e) .1s both;
            border:none;
        }
        @keyframes sheetIn{
            from{transform:translateY(100%)}
            to{transform:translateY(0)}
        }
        .panel.min{transform:translateY(100%);opacity:0;pointer-events:none}

        .handle{padding:8px 0 2px}
        .handle-pill{width:36px;height:4px;border-radius:4px;background:rgba(0,0,0,.08)}
        .handle:active .handle-pill{background:rgba(0,0,0,.2)}

        .panel-header{padding:6px 14px 0}
        .ph-row{margin-bottom:8px}
        .panel-label{display:none}

        .scroll{padding:8px 14px 16px}

        .cats{grid-template-columns:repeat(4,1fr);gap:5px}
        .cat{padding:6px 2px 7px;gap:4px;border-radius:8px;font-size:7.5px}

        .divider{margin:0 14px}

        .hd{margin-bottom:6px}
        .hd-title{font-size:14px}
        .hd-sub{font-size:8px}
        .btn-cam{width:26px;height:26px}
        .btn-cam svg{width:12px;height:12px}

        .grid{grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
        .sw{padding:8px 3px 7px;gap:5px;border-radius:9px}
        .orb{width:34px;height:34px}
        .orb::before{top:3px;left:5px}
        .orb::after{inset:-4px}
        .chk svg{width:12px;height:12px}
        .sw-lbl{font-size:7.5px}
        @keyframes orbIn{
            0%{opacity:0;transform:scale(.82)}
            100%{opacity:1;transform:scale(1)}
        }

        .btn-go{padding:11px;font-size:9px;letter-spacing:1.5px;border-radius:9px}
        .toast{bottom:20px;font-size:11px;padding:8px 16px 8px 12px}
    }

    @media(max-width:768px) and (orientation:landscape){
        .panel{
            left:auto!important;right:0!important;
            top:0!important;width:44%!important;
            max-height:100vh;
            border-radius:20px 0 0 20px;
            background:rgba(255,255,255,.96);
        }
        .handle{display:none}
        .panel.min{transform:none;opacity:1;pointer-events:auto}
        .grid{grid-template-columns:repeat(3,1fr)}
    }

    @media(max-width:390px){
        .panel{max-height:52vh}
        .orb{width:30px;height:30px}
        .sw-lbl{font-size:7px}
    }
    </style>
</head>
<body>

<div class="loader" id="ld">
    <div class="ld-bw"><div class="ld-b"></div></div>
</div>

<div id="container3d_replace"></div>
<div class="toast" id="toast"><span class="toast-dot"></span><span id="toast-msg"></span></div>

<div class="ui">
    <button class="panel-open-btn" id="pob" aria-label="Open configurator">
        <!-- desktop icon -->
        <svg class="pob-icon-desk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <!-- mobile: sliders icon + label -->
        <svg class="pob-icon-mob" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>
            <circle cx="9" cy="6" r="2" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="2" fill="currentColor" stroke="none"/><circle cx="9" cy="18" r="2" fill="currentColor" stroke="none"/>
        </svg>
        <span class="pob-label">Customize</span>
    </button>

    <div class="panel" id="pnl">
        <button class="handle" id="hnd" aria-label="Toggle panel">
            <div class="handle-pill"></div>
        </button>

        <div class="panel-header">
            <div class="ph-row">
                <span class="panel-label">Configurator</span>
                <button class="btn-collapse" id="bcol" aria-label="Hide panel">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </button>
            </div>
            <div class="cats" id="cats"></div>
        </div>

        <div class="divider"></div>

        <div class="scroll">
            <div class="hd">
                <div class="hd-left">
                    <span class="hd-title" id="htl">Body</span>
                    <span class="hd-sub" id="hct"></span>
                </div>
                <button class="btn-cam" id="bx" aria-label="Reset camera">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                </button>
            </div>
            <div class="grid" id="cg"></div>
            <button class="btn-go" id="bn">
                <span id="bn-txt">Next Step</span>
                <span class="btn-go-arrow">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
                </span>
            </button>
        </div>
    </div>
</div>

<script src="https://distcdn.unlimited3d.com/pres/v/2.10.0/unlimited3d.min.js"></script>
<script>
var App=(function(){'use strict';

var ICO={
    check:'<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" stroke="#fff" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'
};

// ── Annotation camera map ──
var ACAM=Object.freeze({
    'open':              {d:'default_camera_desktop', m:'default_camera_mobile'},
    'close':             {d:'default_camera_desktop', m:'default_camera_mobile'},
    'extend_handle':     {d:'camera_handle',          m:'camera_handle_mobile'},
    'retract_handle':    {d:'camera_handle',          m:'camera_handle_mobile'},
    'wheel_spinner_on':  {d:'camera_wheels',          m:'camera_wheels_mobile'},
    'wheel_spinner_off': {d:'camera_wheels',          m:'camera_wheels_mobile'}
});

function resolveAnnotationModifier(raw){
    var n=(raw||'').toLowerCase();
    if(n.includes('open')&&!n.includes('locker'))      return 'open';
    if(n.includes('close')&&!n.includes('locker'))     return 'close';
    if(n.includes('extend'))                           return 'extend_handle';
    if(n.includes('retract'))                          return 'retract_handle';
    if(n.includes('spinner')&&n.includes('on'))        return 'wheel_spinner_on';
    if(n.includes('spinner')&&n.includes('off'))       return 'wheel_spinner_off';
    return null;
}

var SDK={
    distID:'latest',
    solution3DName:'suitcase-color',
    projectName:'resources-for-videos-and-marketing-purposes',
    solution3DID:'62766',
    workspaceID:'93698',
    containerID:'container3d_replace',
    onLoadingChanged:function(isLoading){
        if(!isLoading)applyCamSettings(); // aplicar cuando el modelo termina de cargar
    },
    onPointerClick:function(objects){
        if(!objects||!objects.length)return;
        var obj=objects[0];
        if(obj.type!=='annotation')return;
        var modifier=resolveAnnotationModifier(obj.shortName||obj.name);
        if(!modifier)return;
        var cam=ACAM[modifier];
        if(cam){md(mob?cam.m:cam.d);applyCamSettings();}
        md(modifier);
        showToast(obj.name||obj.shortName||modifier);
    }
};

var P=Object.freeze({
    body:['Body_metal_base','Body_metal_cover'],
    handles:['Handle_base1','Handle_metal-1','Handle_telescope-1'],
    corners:['Corners_base','Corners_cover'],
    wheels:['Wheels_base','Wheels_base_cover','Wheels_front_right_base','Wheels_front_left_base','Wheels_back_right_base','Wheels_back_left_base','Wheels_front_right_center','Wheels_front_left_center','Wheels_back_right_center','Wheels_back_left_centar']
});
var PF=Object.freeze({body:['Body_Case'],handles:['Handles'],corners:['Corners'],wheels:['Wheels']});

var MB=Object.freeze([
    {k:'blue',n:'01 CHROME SATIN ROYAL BLUE',l:'Royal Blue',g:'radial-gradient(circle at 32% 28%,#7aa0f0,#3868c8 50%,#142e6e 100%)'},
    {k:'green',n:'02 CHROME SATIN OLIVE GREEN',l:'Olive Green',g:'radial-gradient(circle at 32% 28%,#8cb85c,#4e7230 50%,#2a3e18 100%)'},
    {k:'orange',n:'03 CHROME SATIN BURNT ORANGE',l:'Burnt Orange',g:'radial-gradient(circle at 32% 28%,#f09848,#c06018 50%,#6e3008 100%)'},
    {k:'red',n:'04 CHROME SATIN CHERRY RED',l:'Cherry Red',g:'radial-gradient(circle at 32% 28%,#e85060,#a82030 50%,#580a12 100%)'},
    {k:'black',n:'05 CHROME SATIN MIDNIGHT BLACK',l:'Midnight Black',g:'radial-gradient(circle at 32% 28%,#484848,#1e1e1e 50%,#080808 100%)'},
    {k:'aluminium',n:'06 CHROME SATIN ALUMINUM',l:'Aluminium',g:'radial-gradient(circle at 32% 28%,#dce0e6,#a8b0ba 50%,#6e7680 100%)'}
]);
var MO=Object.freeze([
    {k:'aluminium',n:'Chrome ALUMINIUM',l:'Aluminium',g:'radial-gradient(circle at 32% 28%,#dce0e6,#a8b0ba 50%,#6e7680 100%)'},
    {k:'black',n:'Chrome MIDNIGHT BLACK',l:'Black',g:'radial-gradient(circle at 32% 28%,#484848,#1e1e1e 50%,#080808 100%)'},
    {k:'red',n:'Chrome CHERRY RED',l:'Red',g:'radial-gradient(circle at 32% 28%,#e85060,#a82030 50%,#580a12 100%)'},
    {k:'blue',n:'Chrome ROYAL BLUE',l:'Blue',g:'radial-gradient(circle at 32% 28%,#7aa0f0,#3868c8 50%,#142e6e 100%)'},
    {k:'orange',n:'Chrome SATIN BURNT ORANGE',l:'Orange',g:'radial-gradient(circle at 32% 28%,#f09848,#c06018 50%,#6e3008 100%)'},
    {k:'green',n:'Chrome SATIN OLIVE GREEN',l:'Green',g:'radial-gradient(circle at 32% 28%,#8cb85c,#4e7230 50%,#2a3e18 100%)'}
]);

var CM=Object.freeze({
    body:{d:'camera_body',m:'camera_body_mobile'},
    handles:{d:'camera_handle',m:'camera_handle_mobile'},
    corners:{d:'camera_corners',m:'Camera_corners_mobile'},
    wheels:{d:'camera_wheels',m:'camera_wheels_mobile'}
});
var DP=Object.freeze({
    blue:['blue','black','aluminium'],green:['green','black','aluminium'],
    orange:['orange','black','aluminium'],red:['red','black','aluminium'],
    black:['black','aluminium'],aluminium:['black','aluminium']
});

var CS=['body','handles','corners','wheels'];
var ci=0,mob=innerWidth<=768,rdy=false;
var sel={body:'aluminium',handles:'aluminium',corners:'aluminium',wheels:'aluminium'};

// Gradients map for category dots
var allMats={};
MB.forEach(function(m){allMats[m.k]=m.g});
MO.forEach(function(m){allMats[m.k]=m.g});

bCats();render();

Unlimited3D.init(SDK);
addEventListener('Unlimited3DReady',boot);
var _t=setTimeout(function(){if(!rdy)boot()},5000);

// Re-aplicar límites de cámara después de cada modifier de cámara
// (los modifiers resetean los controls del SDK)
function applyCamSettings(){
    try{
        if(Unlimited3D.setCameraControlsSettings){
            Unlimited3D.setCameraControlsSettings({
                enableZoom:true,enablePan:false,enableRotate:true,
                minDistance:6,maxDistance:8,dampingFactor:0.15,
                minPolarAngle:0.5,maxPolarAngle:1.7
            });
        }
    }catch(e){}
}

function boot(){
    if(rdy)return;rdy=true;clearTimeout(_t);
    try{
        if(Unlimited3D.showAnnotations)Unlimited3D.showAnnotations(true);
    }catch(e){console.warn('[Samsa] Init warning:',e)}
    dcam();
    document.getElementById('ld').classList.add('hide');
    sendConfig();
}

// ── Toast ──
var _toastT;
function showToast(msg){
    document.getElementById('toast-msg').textContent=msg;
    var t=document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(_toastT);
    _toastT=setTimeout(function(){t.classList.remove('show')},2200);
}

// ── Material application ──
function ap(cat,mat,cb){
    Unlimited3D.changeMaterial({parts:P[cat],material:mat},function(e){
        if(!e){if(cb)cb();return}
        Unlimited3D.changeMaterials({partObjects:[{parts:P[cat],material:mat}]},function(e2){
            if(!e2){if(cb)cb();return}
            var f=PF[cat];if(f)Unlimited3D.changeMaterial({parts:f,material:mat},function(){if(cb)cb()})
        })
    })
}

function md(n){
    try{Unlimited3D.activateModifier({modifier:n});}
    catch(e){console.warn('[Samsa] Modifier error:',n,e)}
}
function dcam(){
    md(mob?'default_camera_mobile':'default_camera_desktop');
    applyCamSettings();
}

// ── UI builders ──
function bCats(){
    var el=document.getElementById('cats');el.innerHTML='';
    CS.forEach(function(c,i){
        var b=document.createElement('button');
        b.className='cat'+(i===ci?' on':'');
        var g=allMats[sel[c]]||'#ccc';
        b.innerHTML='<span>'+c+'</span>';
        b.addEventListener('click',function(){go(c)});
        el.appendChild(b);
    });
}

function go(c){
    ci=CS.indexOf(c);bCats();
    document.getElementById('htl').textContent=c.charAt(0).toUpperCase()+c.slice(1);
    var cm=CM[c];if(cm){md(mob?cm.m:cm.d);applyCamSettings();}
    render();
    if(mob)pnl.classList.remove('min');
    updateNextBtn();
}

function updateNextBtn(){
    var next=CS[(ci+1)%CS.length];
    var txt=next.charAt(0).toUpperCase()+next.slice(1);
    document.getElementById('bn-txt').textContent='Next: '+txt;
}

function render(){
    var g=document.getElementById('cg');
    // Crossfade out
    g.style.transition='opacity .15s,transform .15s';
    g.style.opacity='0';g.style.transform='translateY(4px)';

    setTimeout(function(){
        g.innerHTML='';
        var c=CS[ci],list;
        if(c==='body'){list=MB;}else{
            var ok=DP[sel.body]||DP.aluminium;
            list=MO.filter(function(m){return ok.indexOf(m.k)!==-1});
        }
        document.getElementById('hct').textContent=list.length+' color'+(list.length!==1?'s':'');
        list.forEach(function(it,i){
            var b=document.createElement('button');
            b.className='sw'+(sel[c]===it.k?' on':'');
            b.style.animationDelay=(i*.045)+'s';
            b.setAttribute('aria-label',it.l);
            b.innerHTML='<div class="orb" style="background:'+it.g+'"><div class="chk">'+ICO.check+'</div></div>'
                       +'<span class="sw-lbl">'+it.l+'</span>';
            b.addEventListener('click',function(){pick(c,it)});
            g.appendChild(b);
        });
        // Crossfade in
        requestAnimationFrame(function(){
            g.style.transition='opacity .2s var(--e),transform .22s var(--e)';
            g.style.opacity='1';g.style.transform='translateY(0)';
        });
    },120);
}

function pick(c,it){
    ap(c,it.n);sel[c]=it.k;
    if(c==='body'){
        var d=MO[0];
        ['handles','corners','wheels'].forEach(function(x){sel[x]='aluminium';ap(x,d.n)});
    }
    bCats();render();sendConfig();
}

function sendConfig(){
    if(window.parent&&window.parent!==window){
        var readable={
            body:MB.find(function(m){return m.k===sel.body}).l,
            handles:MO.find(function(m){return m.k===sel.handles}).l,
            corners:MO.find(function(m){return m.k===sel.corners}).l,
            wheels:MO.find(function(m){return m.k===sel.wheels}).l
        };
        window.parent.postMessage({type:'CONFIG_UPDATE',payload:sel,readable:readable,timestamp:Date.now()},'*');
    }
}

// ── DOM refs & events ──
var pnl=document.getElementById('pnl');
var pob=document.getElementById('pob');

updateNextBtn();

document.getElementById('bn').addEventListener('click',function(){ci=(ci+1)%CS.length;go(CS[ci])});
document.getElementById('bx').addEventListener('click',function(){
    // Ripple feedback on cam reset
    dcam();showToast('Camera reset');
});

// Collapse / expand (desktop)
document.getElementById('bcol').addEventListener('click',function(){
    // Limpia la animación de entrada para que la transition de salida funcione
    pnl.style.animation='none';
    pnl.offsetHeight; // force reflow
    pnl.classList.add('off');
    setTimeout(function(){pob.classList.add('show')},220);
});
// Mobile handle
function mobSetMin(v){
    pnl.classList.toggle('min',v);
    if(mob)pob.classList.toggle('show',v);
}
document.getElementById('hnd').addEventListener('click',function(){
    if(mob)mobSetMin(!pnl.classList.contains('min'));
});
pob.addEventListener('click',function(){
    if(mob){mobSetMin(false);}
    else{pob.classList.remove('show');pnl.classList.remove('off');}
});
if(mob)mobSetMin(true);

addEventListener('resize',function(){
    var was=mob;mob=innerWidth<=768;
    if(was!==mob){dcam();mobSetMin(false);}
});

setInterval(sendConfig,5000);

// Service Worker — cachea assets Threedium para carga instantánea en revisitas
if('serviceWorker' in navigator){
    window.addEventListener('load',function(){
        navigator.serviceWorker.register('./sw.js').catch(function(){});
    });
}

return Object.freeze({
    get state(){return Object.assign({},sel)},
    get readable(){
        return{
            body:MB.find(function(m){return m.k===sel.body}).l,
            handles:MO.find(function(m){return m.k===sel.handles}).l,
            corners:MO.find(function(m){return m.k===sel.corners}).l,
            wheels:MO.find(function(m){return m.k===sel.wheels}).l
        }
    }
});
})();
</script>
</body>
</html>
